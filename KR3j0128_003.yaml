body:
  text: 貴耳集卷下宋張端義撰傳曰多聞闕疑慎言其餘則寡尤夫尤者言之所由出也聞不厭多疑則有闕言之謹餘尤則寡矣余貴耳三集成乃補拾前二集之遺可以絶筆矣未能守聖門寡尤之訓粗可備稗官虞初之求必不忘其事之陋也紹興間泰發與㑹之失歡諸子多稡前朝所聞猶未成編或者以作私史告稔成書禍則知文字之害人也如此始信言之為言尤之階也余每得江湖朋舊書云翁以多言得放逐不宜有此集可謂不善處患難者余答書云儀舌尚在焉可忘言子非魚焉知魚之樂東里張端義淳祐丙午閏四月四日書宣和七年南郊畢恭謝上清儲祥宫聞金人已破燕山車駕亟還禁中夜二鼓中人梁兢持宸翰一紙宣示惟書黃中來既入對上獨坐一橫榻兩宫娥擎燭上曰邊警如此盡是蔡攸匿下不令朕知煩卿先草一詔盡言朕失以謝天下連進二草皆不稱上意再三宣諭只要感動人心不須歸過宰輔只說朕不是第三章稍愜上意親筆改寫成即時降出上曰卿未可去適來李邦彥等皆譸張失措且去外面商量此詔是朕自思算更有二事待與卿說朕欲遣王黼蔡攸等分守大河盡籍內臣貴戚幸佞家財抵備犒軍朕傳位與皇太子淵聖名朕移軍長安保扞關中為根本卿可就此為朕處置明日便要都了只是未有人做宰相是夜二府皆至銀臺門矣罪己詔下忽吳敏拜少宰李綱拜尚書左丞淵聖登極道君南幸向來御筆皆不行內禪之前上諭曰處置許多事蔡攸盡道不是只傳位一事靠要做他功勞淵聖嗣位臺諫交章請誅京攸雖楊中立不免宣言蔡攸無罪之語但見論者紛然以誅王黼為快而右蔡氏矣徽宗北狩有諜者持一黃中單來御書云趙岐注孟子付黃潛善諸人審思之孟即瑤華太后趙即康王髙宗由是中興載泣血録真廟宴近臣語及莊子忽命秋水至則翠鬟緑衣一小女童誦秋水一篇聞者竦立昔聞仁宗時有外臣奏陛下不蚤立太子有播遷之禍仁宗大怒問宰執曰朕未立皇子如何比朕如唐明皇有播遷之禍宰相奏云陛下果是播遷不及明皇當時明皇幸蜀尚有肅宗即位靈武陛下無肅宗為子委不及明皇仁宗怒釋建立之議始堅孝皇一日宣押王丞相趙丞相施元樞周大參幸一燕咨訪政事駕方御座見御案上有一黃綾册上忽駕興二相不敢近看獨周大參略開一看不覺吐舌復掩册如初移時上來遽問卿等不曾看此册否皆以不敢對來日周大參入堂首與二相言此册即是前宰執所進臺諌姓名見今宰執所進擬者皆在焉孝皇聖斷不可測度前相既去後相即拜卻除前相進擬臺諌後相雖有進擬慮其立黨不除恐臺諫奉承後相風旨以攻前相所以存進退大臣之體今則不然一相去臺諌以黨去一相拜臺諌以黨進况自嘉定副封之靡前帝宏規廢矣髙宗孝宗在御每三年大比下詔先一日奉詔露天默禱曰朝廷用人别無他路止有科舉願天生幾箇好人來輔助國家及進殿試䇿題臨軒唱名必三日前精禱于天所以紹興淳熙文人才士彬彬在朝此二祖祈天之效如此夀皇過南內德夀問近日臺臣有甚章疏夀皇奏云臺臣論知閣鄭藻德夀云說甚事不是說他娶嫂夀皇奏云正說此事德夀云不看執柯者面夀皇問執柯者誰德夀云朕也夀皇驚灼而退臺臣即時去國德夀丁亥降聖遇丙午慶八十夀皇講行慶禮上尊號周益公當國差官撰册文讀册書册擬楊誠齊尤延之各撰一本預先進呈益公與誠齊鄉人借此欲除誠齊一侍從為潤筆册文夀皇披閲至再即宣諭益公楊之文太聱牙在御前讀時生受不若用尤之文溫潤益公又思所以處誠齊奏為讀册官夀皇云楊江西人聲音不清不若移作奉册夀皇過內奏册寶儀節及行禮官讀至楊某德夀作色曰楊某尚在這裏如何不去夀皇奏云不曉聖意德夀曰楊某殿册內比朕作晉元帝甚道理楊即日除江柬漕誠齊由是薄憾益公孝宗朝幸臣雖多其讀書作文不減儒生應制燕閒未可輕視當倉卒翰墨之奉豈容宿撰曾覿龍大淵本名奫孝宗寫開二字張掄徐本中王抃趙弗劉弼中貴則有甘昺張去非弟去為外戚則有張說吳琚北人則有辛棄疾王佐伶人則有王喜棋國手則有趙鄂當時士大夫少有不游曾龍張徐之門者張景卿因奏對仁宗曰卿亦出孤寒張對曰臣本書生陛下擢至中丞三子皆服冠裳陛下春秋髙主鬯虛臣非孤寒陛下乃孤寒也上嘉納之道君北狩在五國城或在韓州凡有小小凶吉喪祭節序北國必有賜賚一賜必要一謝表北國集成一帙刋在𣙜場中博易四五十年士大夫皆有之余曾見一本更有李師師小傳同行于時李抄本作呂道君幸李師師家偶周邦彥先在焉知道君至遂匿于牀下道君自攜新橙一顆云江南初進來遂與師師謔語邦彥悉聞之櫽栝成少年遊云并刀如水吳鹽勝雪纖手破新橙後云嚴城上已三更馬滑霜濃不如休去直是少人行李師師因歌此詞道君問誰作李師師奏云周邦彥詞道君大怒坐朝宣諭蔡京云開封府有監稅周邦彥者聞課額不登如何京尹不按發來蔡京罔知所以奏云容臣退朝呼京尹叩問續得復奏京尹至蔡以御前聖旨諭之京尹云惟周邦彥課額增羡蔡云上意如此只得遷就將上得旨周邦彥職事廢弛可日下押出國門隔一二日道君復幸李師師家不見李師師問其家知送周監稅道君方以邦彥出國門為喜既至不遇坐久至更初李始歸愁眉淚睫憔悴可掬道君大怒云爾去那裏去李奏臣妾萬死知周邦彥得罪押出國門略致一杯相别不知官家來道君問曾有詞否李奏云有蘭陵王詞今柳隂直者是也道君云唱一遍看李奏云容臣妾奉一杯歌此詞為官家夀曲終道君大喜復召為大晟樂正後官至大晟樂樂府待制邦彥以詞行當時皆稱美成詞殊不知美成文筆大有可觀作汴都賦如箋奏雜著皆是傑作可惜以詞掩其他文也當時李師師家有二邦彥一周美成一李士美皆為道君狎客士美因而為宰相吁君臣遇合于倡優下賤之家國之安危治亂可想而知矣李抄本作呂孝皇聖明亦為左右者所惑有一川官得郡陛辭有宦者奏知來日有川知州上殿官家莫要笑夀皇問如何不要笑外面有一語云裹上幞頭西字臉恐官家見了笑只得先奏所謂知州者面大而橫闊故有此語來日上殿夀皇一見憶得先語便笑卿所奏不必宣讀容朕宫中自看愈笑不已其人在外曰早來天顔甚恱以某奏劄稱旨殊不知西字臉先入之言所以動夀皇之笑也王尚之為郎日輪對一劄乞減宫嬪之冗夀皇問卿是外臣如何知朕宫中事臣備貟內府丞見每月宫中請給歷歷具道大小請給細數夀皇大喜即日除浙漕卻不及作侍從曾作太府卿髙孝二朝帥蜀必要臨遣未嘗就外除亦以蜀為重事廟堂欲除崔菊坡先生覺菊坡之意未就司諌王貫卿上疏指以士大夫辭難避事不肯任朝廷之委用疏上後菊坡之命始出菊坡只得一行在九江時余往見之扣其入蜀之意菊坡自言朝廷以蜀中散亂令某整齊之余進曰今天下散亂豈特一蜀耶朝廷何不留先生整齊天下之散亂而獨私于蜀耶菊坡唯唯而已近湯季能有辭難避事之疏三十年間兩見之恨無菊坡再見此疏也夀皇問王抃如何北使在庭舞蹈極可觀此間舞蹈皆不及之抃奏云北人袖窄但公裳袖大一舉手便可觀南人袖內外俱寬大舉手便不可看北人視此為大禮數德夀孝宗在御時閣門多取北人充贊喝聲雄如鐘殿陛間頗有京洛氣象自嘉定以來多是明台溫越人在閣門其聲皆鮑魚音矣夀皇以孝治天下有大理寺孫寺丞失記其名匿服不丁母憂夀皇怒欲誅之奏知德夀云孫某不孝欲將肆諸市朝德夀云莫也太甚遂黥面配廣南數年得歸余兒時曾見之今之士大夫甚至聞訃仕宦冒榮自若衰絰有不曾著者食稻衣錦汝安則為之聖門之訓天理滅絶去禽獸幾希宣和元年間髙麗遣使一旦忽上奏以其王病求醫上擇二良醫往歲餘方歸二醫奏王館醫甚勤謂曰髙麗小國世荷國恩不敢忘聞天子用兵遼實兄弟國茍存之猶是為中國捍邊女真乃新起不可交也願二醫告諸天子早為之備慈寧殿賞牡丹時椒房受册三殿極歡上洞達音律自製曲賜名舞楊花停觴命小臣賦詞俾貴人歌以侑玉巵為夀左右皆呼萬歲詞云牡丹半坼初經雨雕檻翠幕朝陽嬌困倚東風羞謝了羣芳洗烟凝露向清曉步瑤臺月底霓裳輕笑淡拂宫黃淺擬飛燕新妝楊柳啼鴉畫永正鞦韆庭館風絮池塘三十六宫簪豔粉濃香慈寧王殿慶清賞占柬君誰比花王良夜萬燭熒煌影裏留住年光此康伯可樂府所載夀皇使御前畫工寫曾海野喜容帶牡丹一枝夀皇命徐本中作贊云一枝國艷兩鬢東風夀皇大喜紹興初楊存中在建康諸軍之旗中有雙勝交環謂之二聖環取兩宫北還之意因得美玉琢成帽環進髙廟曰尚御裹偶有一伶者在旁髙宗指環示之此環楊太尉進來名二勝環伶人接奏云可惜二聖環且放在腦後髙宗亦為之改色所謂工執藝事以諫向薌林因入對論奏甚久上顧問再三中書舍人潘良貴攝左史忽出位言曰天時暑甚向某不合以無益之言久勤聖聽公退上章待罪且乞致仕或者謂榻前因奏端研書畫潘有此言五峰行狀大略相似所奏不同耳方臘作亂朝廷捕之獻言者曰若急請于朝以劉公安世守南都陳公瓘鎮金陵人望歸之可不勞兵而破矣此薌林語也致堂先生行狀中載之王丞相欲進擬辛幼安除一帥周益公堅不肻王問益公云幼安帥材何不用之益公答云不然凡幼安所殺人命在吾輩執筆者當之王遂不復言孝皇朝不許宰相進擬鄉人王丞相在相位八年林子中亦鄉人八年不得除命吳越錢王入朝太祖曰謀下江南許以舉兵援助歸語其臣沈倫倫再三嗟嘆錢王扣之倫云江南是兩浙之籓籬堂奧豈得而安耶大王指日納土矣宣和年結女真攻契丹契丹果滅隨即二帝北狩此亦自撤藩籬也今又以滅金國䝉古橫行襄蜀此又自撤藩籬矣喬行簡為淮西漕便民五事曾說此一項是亦祖江南之沈倫也夀皇賜宰執宴御前雜劇妝秀才三人首問曰第一秀才仙鄉何處曰上黨人次問第二秀才仙鄉何處曰澤州人又問第三秀才仙鄉何處曰湖州人又問上黨秀才汝鄉出甚生藥某鄉出人參次問澤州秀才汝鄉出甚生藥某鄉出甘草次問湖州出甚生藥出黃蘖如何湖州出黃蘖最是黃蘖苦人當時皇伯秀王在湖州故有此語夀皇即日召入賜第奉朝請何自然中丞上疏乞朝廷併庫夀皇從之方且講究未定御前有燕雜劇伶人妝一賣故衣者持褲一腰只有一隻褲口買者得之問如何著賣者云兩腳併做一褲口買者云褲郤併了只恐行不得夀皇即寢此議世之巧宦者皆謂之鑽班固云商鞅挾三術以鑽孝公嘉定間士大夫有一戲論於從政云將仕皆得改官獨顔子孔門四科之首不得改官夫子曰回也不改顔子鑽錯了鑽之彌堅如何改官天寶間楊貴妃寵盛安祿山史思明之作亂遂有楊安史之謠嘉定間楊太后史丞相安樞密亦有楊安史之謠時異事異姓偶同耳平江道士袁宗善曾遇異人得驗狀法遭際三殿賜通真先生夀皇一日使中貴持白紙三幅默禱在內令通真書來中貴先排定資次第一紙書不可行第二紙書無分第三紙書真真二字奏呈夀皇隔數月皆驗不可行要請陵寢北報不從無分乃小劉娘子要册后半年而殂真真二字乃受禪光宗後來光宗有心疾夀皇宣通真私問二真字通真奏云臣書先定二真合成一字即㒹字夀皇大喜前定皆驗賜賚甚厚此袁通真親與先君言有一川官在都乞差遣一留三四年題一詩在僦樓之壁曰朝看貝葉牢籠佛夜禮星辰取奉天呼召歸來聞好語初三初四亦欣然初三初四即二僕也因此詩傳搖京下遂得缺而去王黼宅與一寺為鄰有一僧每日在黼宅溝中流出雪色飯顆漉出洗淨曬乾不知幾年積成一囤靖康城破黼宅骨肉絶糧此僧即用所收之飯復用水淘蒸熟送入黼宅老幼賴之無飢嗚呼暴殄天物聖人有戒宣和年間士大夫不以天物加意雖溝渠汚穢中棄散五穀及其餓餒之時非僧積纍之久一家皆絶食而死可以為士大夫暴殄天物者戒荆公黜詞賦尊經獨春秋非聖經不試所以元祐諸人多作春秋傳解自胡安定先生始如孫莘老輩皆有春秋集解則知熙寧元祐諸人議論素不同矣唐子西云挾天子以令諸侯諸侯必從然謂之尊君則不可挾六經以令百氏百氏必服然謂之尊經則不可蜀士胡其姓者知其女貴能生子作宰相攜入京師尋一朝士生宰相者即與之遇道間見韓光祿國華拜于馬首云三年在京師閲人多矣光祿必生宰相子敢以女為獻後果生魏公今韓氏家廟有胡夫人即斯人女也錢參政良臣之妻弟章其姓者自南康守回忽進擬浙東倉孝皇忽云執政妻黨便得好官參政李彥頴奏云章守南康有聲諸臺列薦以此除激勵作郡者章某見乞祠孝皇云且與祠章由是而不復起矣謝文昌源明館伴北使時寧廟初即位定册時諸臣頗有議論北使忽問謝云伊尹放太甲于桐此何義指光宗屬疾而言謝答曰有伊尹之志則可無伊尹之志則不可避一篡字朝論甚偉李季章云蘇東坡作文愛用佛書中語如赤壁懷古詞所云羽扇綸巾談笑間檣艫灰飛煙滅所謂灰飛煙滅四字乃圓覺經中語云火出木燼灰飛煙滅也開禧議和首遣方信孺通書奉使和議未成欲遣輔漢卿輔辭以考亭諸生老不稱使乃薦王都廂柟代為行人王往還至四敵有一伴使顔元者問韓托胄是甚麼人答云魏公之孫吳太后之肺腑有擁佑之勳又問云官裏如何信任他不知去得他否王答云大臣去留出自聖斷伴使就懷中取出本朝省劄韓托胄軍怒已擊死王為之驚駭當時一語之差豈不失兩國之體則知專對之為難事也衛社稷宗社者大臣職也死社稷宗社者大臣之不幸也韓托胄柄國皆由道學諸公激之使然紹熙五年七月光宗屬疾寧皇未內禪外朝與中禁勢相隔絶趙忠定招托胄通太后意中官關禮同任往來之㫖寧廟即位諸公便掩托胄一日之勞嗾臺諌給舍攻其專輒之罪此時托胄本不知弄權怙勢為何等事道學諸公反教之如此為之弄權如此為之怙勢及至太阿倒持道學之禍起矣後十年坤鑑一進資善一疏起于張鎡吳衡王居安之謀其他皆因人成事者也和議成奉使許奕吳衡副之敵索首謀函首至濠二使不敢進小使往返數次敵云既是講和必無創出禮數國信不必慮函首才至敵界敵中臺諌交章言韓托胄忠于其國繆于其身封為忠繆侯將函首祔葬于魏公韓某墓下仍劄報南朝當時丘宗卿開督府在建康備坐北劄遍劄諸州監司先父適漕淮東親得此劄幸一見之儂智髙發三解不得志遂起兵兩廣遂有兩解試攝官之格張元因殿試落第徑往西夏自此殿無黜落之士施宜生以賀正使來韓子師館伴因語日射三十六熊賦云雲屯八百萬騎日射三十六熊以八百萬騎對三十六熊何其鮮哉宜生語塞大抵南北二使皆不深書司射所載熊即侯也非獸也乖崖張公帥蜀時請于朝創用楮幣約以百界嘗見蜀老儒輩言謂此是世數所關七八年前已及九十九界蜀閫建議虛百界不造而更造所謂第一界行之未久而蜀遂大壞時數之論于是為可信辛卯歲北來人數百輩暫寓于襄陽府九華寺有一人題詩于壁云干戈未定各何之一事無成兩鬢絲蹤跡大綱王粲傳情懷小樣杜陵詩鶺鴒信斷雲千里烏鵲巢寒月一枝安得中山千日酒陶然直到太平時雖未為絶唱讀之亦使人增感也少游郴陽詞云霧失樓臺月迷津渡桃源望斷知何處可堪孤館閉春寒杜鵑聲裏斜陽暮詩話謂斜陽暮語近重疊或改簾櫳暮既是孤館閉春寒安得見所謂簾櫳二說皆非嘗見少游真本乃斜陽樹後避廟諱故改定耳山谷詞杯行到手莫留殘不到月斜人散詩話謂或作莫留連意思殊短又嘗見山谷真蹟乃是更留殘詞意便有斡旋也鶴山先生母夫人方坐蓐時其先公晝寢夢有人朝服入其卧內因問為誰答曰陳了翁覺而鶴山生所以用其號而命名陳瑩中前三名登第後兩甲子鶴山中第亦第三名其出處風節相似處極多在東南時有了翁家子孫必異遇之章子厚在政府有惇賊邦曲之號一曰邦直又復唐巾裹子厚曰未消爭競只煩公令嗣戴來略看子由語張文潛曰廟堂之上謔語肆行在下者安得不風靡王嘉叟題王龜齡詹事祠堂詩當時孤論偶相同終始知心每愧公才見安車延綺季遽嗟石室祀文翁百年公議分明在一餉紛華究竟空白髮舊交衰甚矣尚能留面對髙風自注云始豫與龜齡别嘗謂吾輩㑹合不可常但令常留面目異時可復相見龜齡再三擊節後一見必誦此言東坡水龍吟笛詞八字諡楚山修竹如雲異材秀出千林表此笛之質也龍鬚半翦鳯膺微漲玉肌勻繞此笛之狀也木落淮南雨晴雲夢月明風嫋此笛之時也自中郎不見將軍去後知辜負秋多少此笛之事也聞道嶺南太守後堂深緑珠嬌小此笛之人也綺窗學弄凉州初試霓裳未了此笛之曲也嚼徴含宫泛商流羽一聲雲杪此笛之音也為使君洗盡蠻煙瘴雨作霜天曉此笛之功也五音已用其四乏一角字霜天曉歇後一角字歐陽公論琴帖為夷陵令時得琴一張于河南劉㞦蓋常琴後作舍人又得一琴乃張奧琴也後作學士又得一琴則雷琴也官愈昌琴愈貴而意愈不樂在夷陵青山緑水日在目前無復俗纍琴雖不佳意則自釋及作舍人學士日奔走于塵土中聲利擾擾無復清思琴雖佳意則昏雜何由有樂乃知在人不在器也若有心自釋無絃可也濮上陳摶以先天圗傳种放放傳穆修修傳李之才之才傳卲雍放以河圗洛書傳許堅堅傳范諤昌諤昌傳劉牧修以太極圗傳惇頤惇頤傳二程濓溪得道于異僧夀涯晦菴亦未然其事以異端疑之漢人尚氣好博晉人尚曠好醉唐人尚文好狎本朝尚名好貪韓愈皇甫湜一世龍門牛僧儒攜所業謁之其首篇說樂韓見題即掩卷而問曰且道拍板唤作甚牛曰樂句二公大稱賞之因此名動京師黃初年三月癸卯月犯心大星占曰心為天王位王者惡之四月癸巳蜀先主殂于永安宫客星歷紫宫而劉聰殞彗星掃太微而苻堅敗熒惑守帝坐而呂隆破晉庾翼與兄氷書曰歲星犯天闕江東無他而季龍頻年閉關余甲子年侍親出蜀在荆南沙市申未間見一星自柬南飛在西北如世之火珠狀其光數丈長久而成一皇字丙寅冬吳曦叛丁亥年余為儀真録參十月二十三日夜因觀天象見一星入月算厯者鄒淮絶早相别云昨夜星入月恐兩淮兵動不可住徑唤渡過建康余問之前有此否鄒云漢獻帝時曾一次星入月今再見也十一月十二日劉倬舉兵僇季姑姑反戈一城狼狽倬以身免繼此兵禍未泯也庚寅年余丞浦江三月間近午日色略覺昏意謂日蝕外看山林屋宇皆成青色及兄弟骨肉相看面皆如鬼其色青甚如此日不移影至酉方動是年有繆春武庫之變余嘗在方册間或書此怪異終未便信豈謂身自見之東海中有山曰度朔上有大桃盤屈三千里其卑枝向東北曰鬼門萬鬼所由往來也上有二神人一曰神荼一曰鬱壘主治害鬼世人刋此桃梗正歲以置門戶此出戰國策桃梗注粉白黛黑戰國策張儀曰鄭周之女粉白黛黑注云黛黑非知而見之者以為神漢武故事曰上起明光宫發燕趙美女二千人充之皆自然美麗不使粉白黛黑又楚辭大招曰粉白黛黑施芳澤只惟韓文公送李願歸盤谷序乃云粉白黛緑東坡答王定國書粉白黛緑者繫君火宅中狐狸射干之流願以道眼看破方變黑為緑字丘宗卿帥蜀陛辭奏夀皇吳家兵太專他日必有可慮此時吳挺為興州都統兼知興州乞得二庚牌臣緩急可用居無何挺殂宗卿急發庚牌檄張詔交軍除興州都統西兵姓移于他姓自開禧間吳曦再領興州兵北伐之事興曦果以叛聞人服宗卿之逺見宗卿與京仲逺為代京在蜀時適有瀘州張庭芬之變仲逺寬厚僇其渠魁餘皆從釋京偶帶都吏行宗卿就仲逺舟中擒去立斬之仲逺大不樂後仲逺作相宗卿家食十年能知吳氏之兵必叛不知仲逺之作相何明于彼不明于此耶開禧兵興始開制閫主行和議復開督府年已八十餘矣黃巢五歲侍翁父為菊花聫句翁思索未至巢信口應曰堪與百花為總首自然天賜赭黃衣巢之父怪欲擊巢乃翁曰孫能詩但未知輕重可令再賦一篇巢應之曰颯颯西風滿院栽蘂寒香冷蝶難來他年我若為青帝移共桃花一處開跋扈之意己見嬰孩之時加以數年豈不為神器之大盜耶筆之用以月計墨之用以歲計硯之用以世計筆最鋭墨次之硯鈍者也豈非鈍者夀而鋭者夭乎筆最動墨次之硯靜者也豈非靜者夀而動者夭乎于是得養生焉以鈍為體以靜為用惟其然是以能永年此唐子西硯銘東坡作病鶴詩嘗寫三尺長脛瘦軀闕其一字使任德翁輩下之凡數字東坡徐出其藁蓋閣字也此字既出儼然如見病鶴矣王萬年副都統因貽書岷峨山拗牛和尚不答書但與來人說傳語太尉早歸人至問和尚有書無書堅不肻說萬年云我已知了爾直說久而方云和尚請太尉早歸三日後盥潄間即逝人問拗牛云王太尉是第六洞萬年鬼王所以姓王名萬年均州武當山真武上升之地其靈應如響均州未變之前敵至聖降筆曰北方黑煞來吾當避之繼而真武在大松頂現身三日民皆見之次年有范用吉之變敵犯武當宫殿皆為一空有一百單五歲道人首殺之則知神示人有去意矣浮光未破之前開城濠得一鐵坐佛高三丈城東元有鐵佛寺其僧請歸本寺百餘軍輿之不動軍帥禱之許以草創小寺安奉只用三五十輩小兒輿之即行後差老巫媪奉事凡有病告者飲佛水即安端平四年敵圍城炮聲震天鐵佛為之撼戰後敵攻定城敵人以炮坐罩鐵佛于其下光州遂失左傳云國將興聽于人國將亡聽于神即此意也歐陽詢藝文類聚有為禽獸九錫以雞為稽山子以驢為廬公者吳越毛勝撰水族加思簿以海龍為君各有詞令祖歐陽之遺意也仕之不稱者許郡將或部使者兩易其任謂之對移漢薛宣為左馮翊以頻賜令薛恭本縣孝者未嘗知治民而粟邑令尹賞久用事宣即奏賞與恭換縣乃對移所起也天道尚左星辰左轉地道尚右瓜瓠右纍蟻穴知雨鳥鵲知風燕遜戊巳鵲背太歲魚聚北道針浮南指葵知南日菊知隕霜此物之靈也人有不節醉飽不謹寒暑孰謂人為萬物之靈因書為座右銘四夷附録內典云人火得水而滅龍火得水而熾信有此理隂陽自然變化論云龍能變水人能變火龍不見石人不見風魚不見水鬼不見地此亦理也士大夫最怕有虛名虛名一勝不為朝廷福真西山負一世盛名豈西山真欲愛名于天下天下自聞其名而起敬耳及史同叔之死天下之人皆曰真直院入朝天下太平可望及其入朝前譽小減省試主文為輕薄子作賦曰誤南省之多士真西山之餓夫都下諺曰若要百物賤須是真直院及至唤得來攪做一鑊麵如是則聲名自是一項事業自是一項江南地土淺薄士大夫只做得一項做不得兩項市井呼盧盧四也博徒索采曰四紅赤緋皆一骰色也俗說唐明皇與貴妃喝采若成盧即賜緋之義楚辭招魂成梟而牟牟即盧也又曰玈杜子美詩繞牀大呌呼五白袒裼不肻成梟盧注謂劉穆之兄劉毅家無儋石之儲呼盧一擲百萬共舉大事何謂無成又詩劉毅從來布衣願家無儋石輸百萬唐李翺撰五木經元革注云雉為二梟為六盧為四錢穆父尹開封有店主告有道人獨賃一房每日以新錢三千置之座側沽酒市肉迄暮而還乃攜炭一小籃入房中人語小定則擁爐鑄錢未半夜三千成矣不敢不告穆父遣人邏之道人迎揖曰大尹來要貧道否至庭下穆父詰之曰爾必有術何敢于輦轂下為之道人曰貧道鑄者泥錢不曾用銅似不礙法令但得半乾半濕泥一塊以兩錢脫就便可成穆父命取泥試之逡巡成泥錢一千以索貫之呈穆父大怒擲于案旁激而有聲迸散在地道人忽不見取其錢重穿之每錢背二口字知其洞賔也今以鐵化銅為錢亦近于用泥矣淳熙間省元徐履因功名之念太重遂有心恙之疾殿試用卷子寫一枝竹題曰畫竹一竿送上試官朝廷亦優容之以省元身後一官與其子子亦恙官亦絶席大光以母葬碑銘皆數千言屈吳傅朋書之大光立于碑側不數字必請傅朋憩偃終日不能兼備傅朋病之至夜分潛起秉燭而書大光聞之起立以文房玩好之物盡歸之預儲六千緡而潤毫或曰傅朋之貧脫矣未幾而大光死傅朋嘆曰吾之貧分也大光之死由我也真定大厯寺有藏殿雖小而精巧藏經皆唐宫人所書經尾題名氏極可觀佛龕上有一匣開鑰有古錦儼然有開元賜藏經敕書及㑹昌以前賜免拆殿敕書有塗金匣藏心經一卷字體尤婉麗其後題曰善女人楊氏為大唐皇帝李三郎書寺僧珍寶之吳江長橋焚于庚戌之變紹興四年新橋復成縣令楊同者謀新之始未嘗委一吏末嘗科一夫但命十僧分幹一橋之利可支百年始謀興工亦俾諸僧分諭上戶往往出資為助震澤王闈者朱勔之黨乃積逋數千緡連劵百紙請同自督之同笑曰此逋豈可督也徐命闈坐取火盡焚其劵同以臺疏因擾民而罷此闈嗾之曹友聞鳯州人為天水軍教授有學職時當可乃天水巨室辛卯冬聞䝉古深入天水守倅棄城不守時當可藉家丁推友聞為主守城李說齊作帥知其事實寫旗贈之曰狀元及第三年有教授提兵四海無後戰死于大安軍雞翁關此丙申年也李昴英字俊眀廣人也主上諒隂榜第三名及第初任臨汀推官陳孝嚴激軍變盡出家資撫定之曾治鳯帥廣激曽忠之變崔菊坡臨城借用經略司印撫諭李縋城入賊曉以禍福五羊城郭得全賊之肇慶就捕朝廷録功名之首除榮王府教授亦因朝臣之請李力辭不供職但云素無學問難以移氣習士論韙之陳習菴名塤省元父母求子于佛照光禪師就上寫一偈末後二句云諸佛菩提齊著力只今生箇大男兒此十月三十日書至十二月三十日習菴生父母乞名于佛照光曰覺老余親見二狀習菴無髭有則去之凡有除目即先夢見住院前身即一尊宿也臨安中瓦在御街中士大夫必游之地天下術士皆聚焉凡挾術者易得厚獲之來數十年間向之術行者皆多不驗惟後進者術皆奇中有老于談命者下問後進汝今之術即我向之術何汝驗我若何不驗後進者云向之士大夫之命占得祿貴生旺皆是貴人今之士大夫之命多帶刑殺衝擊方是貴人汝不見今日為監守司帥閫者日以殺人為事汝之術所以不驗也老者歎服而去伶者自漢武時東方朔以諧謔進其間以言語盡規導之意至唐髙力士輩出人主溺于宴安鴆毒為君之道絶矣及五代李亞子歐陽公作伶人傳首焉極稱請箭前驅縞素從戎繫燕父子以組函梁君臣首入于太廟還矢先王而告以成功其意氣之盛何其壯哉晚年耽于詼諧與周匝景進敬新磨狎泄終至亡國死無以葬以樂器焚之何其始英武後荒迷耶嘗讀放翁南唐書有一事可取李王召一名將欲害之酌酒一杯與其將飲將知內有毒堅不肻飲奉杯前曰臣當先奉為王夀君臣交爭不决有一伶人自殿下舞上殿曰此酒臣先飲奪將手中杯一舉而盡再舞下殿及殿門而卒一時倉卒遂解君臣之疑雖曰小人以一死存國體可謂知幾之士矣晉王衍口不言錢强名阿堵俗言兀底律貪之謂也古語云少則樂無則憂多則纍又曰牢收長物金三品密寫虛名墨一行又曰須知世上金銀寶借汝閒看六十年又曰饒君且恁埋藏卻煞有人曾作主來積而能散君子韙之為富不仁古人深戒曲江有二奇張相國以鐵鑄六祖襌師以銅鑄俗語云鐵胎相公銅身六祖鐵胎有二身一在廟一在郡庠銅身在大鑒寺廣州天慶觀有銅鑄劉王像當鑄時不像其容殺數匠始成衮冕具在達官有癱緩之疾有道人曰古人已死身不壞今人未死身先壞信知古人之死數雖盡而所養固在至于百年之歲尚有容貌如生者今人貪利祿則損其心窮嗜欲則喪其本數未盡而軀已腐矣楊誠齊帥某處有教授狎一官妓誠齊怒黥妓之面押往謝辭教授是欲愧之教授延入酌酒為别賦眼兒媚鬢邉一㸃似飛鴉莫把翠鈿遮三年兩載千撋百就今日天涯楊花又逐東風去隨分落誰家若還忘得除非睡起不照菱花楊誠齊得詞方知教官是文士即舉妓送之史記胸奴傳漢遺單于有黃金飾具帶一漢書音義曰腰中大帶黃金骨紕徐廣曰犀毗引戰國策趙武靈王賜周紹具帶黃金師比即帶鉤也師比即犀毗也升斗古小而今大昔人飲酒有數石不亂者班固論一夫百畝所收之粟人食月一石五斗古之人亦今之人也豈有一人能飲數石日食五升者乎古人有言登公卿之門而不見公卿面目一辱也對公卿面目而莫測公卿之心二辱也識公卿之心不知我之心三辱也大丈夫寧就萬死不受一辱韶州涔水場以滷水浸銅之地㑹百萬斤鐵浸煉二十萬銅且二廣三十八郡皆有所輸或供鉛錫或供銀或供錢歲計四五萬緡饒監所鑄歲止十五萬二廣未嘗曾見一新錢所在州縣村落未嘗一日無銅錢殊不可曉所謂㑹子皆視之棄物不知朝廷一如二廣只使見錢不知㑹子未知可行否乎淳熙間有二婦人能繼李易安之後清菴鮑氏秀齊方氏方即夷吾之女弟皆能文筆端極有可觀清菴即鮑守之妻秀齊即陳日華之室秀齊能識人有兩館客一陳勉之丞相一陳景南內相乾道間有一媵隨嫁單氏而生尚書䕫又往耿氏生侍郎延年及死尚書侍郎爭葬其母事達朝廷夀皇云二子無爭朕為葬之衣冠家至今為美談呂㜑即吕正已之妻淳熙間姓名亦達天聽蘇養直家孫女曰蘇㜑其嚴毅不可當三五十年朝報奏疏琅琅口誦不脫一字舊京畿有二漕一吕搢一吕正已搢家諸姬甚盛必約正已通宵飲吕㜑一日大怒踰牆相詈搢之子一彈碎其冠事徹孝皇兩漕即日罷今止除一漕自此始吕㜑有女事辛幼安因以微事觸其怒竟逐之今稼軒桃葉渡詞因此而作袁彥純尹京師專留意酒政煮酒賣盡取常州宜興縣酒衢州龍游縣酒在都下賣御前雜劇三箇官人一曰京尹二曰常州太守三曰衢州太守三人爭座位常守讓京尹曰豈宜在我二州之下衢守爭曰京尹合在我二州之下常守問云如何有此說衢守云他是我兩州拍戶寧廟亦大笑韶州南華寺乃六祖大鑒禪師真身道場有達麼衣鉢存焉所謂袈裟尚有髣佛而鉢猶存有一痕僞劉公主所觸今寺有補鉢莊即公主捨也有虎夜必來守衣鉢如則天所賜皆不存獨有柳子厚文亦非舊本更有黃葉齊僧文自稱率土大將軍唐之丁酉年後彭帥為經略適有曾忠之變亦是丁酉年遂碎此碑碑隂乃東坡飯僧疏文二碑俱不存矣東坡艾子有曰禽大禽大無事早下山去託此為談謔之助世人相傳笑話余因録一二事以資好事者一笑有知州未滿交代遽至在任者不肻去赴任者不得入欲赴者怒遂起民兵諸寨兵外縣弓手攻城在任者見事勢急率廂禁軍守城監司得知按發朝廷曰攻城者以違年不赴守城者以擅離任所聞者莫不大笑富家大室多是為富不仁為人撰一說以譏之有一多錢翁每自誇侈我世間飲食品饌水陸畢陳飽飫醲鮮盡矣思得天上美饌略供匕箸可以延年益夀或者告之須是齊戒設醮拜章精禱方可感格上天必得賜汝美饌如此禱告數年忽一夕正啓醮間有二天神自空虛而下奉一大合呼愚民天帝賜汝食拜而受之愚民得此合再三焚香感戴發合取食但見兩枚火燒而已愚民懊恨許多時禱告卻得兩箇火燒此世所有之物天神叱曰愚民不曉事汝尋常但喫人火燒今次喫天火燒也史同叔為相日府中開宴用雜劇人作一士人念詩曰滿朝朱紫貴盡是讀書人旁一士人曰非也滿朝朱紫貴盡是四明人自後相府有宴二十年不用雜劇廣州有二事可怪鹽步頭水客人所買鹽籮必以此水灑之經久不析不化市舶亭水為番船必取經年不臭不壞他水不數日必敗物理不可曉如此貪泉雖有吳隱之詩及有二碑或曰在石門今則不知其所矣今之校椅古之胡牀也自來只有栲栳樣宰執侍從皆用之因秦師垣在國忌所偃仰片時墜巾京尹吳淵奉承時相出意撰製荷葉託首四十柄載赴國忌所遣匠者頃刻添上凡宰執侍從皆有之遂號太師樣今諸郡守倅必坐銀校椅此藩鎮所用之物今改為太師樣非古製也餘干有王德者僭竊九十日為王有一士人被執作詔云兩條脛腚馬趕不前一部髭髯蛇鑽不入身坐銀校之椅手執銅鎚之䤪翡翠簾前好似漢髙之祖鴛鴦殿上有如秦始之皇一應文武百官不許著草屨上殿王德就擒此士人得以作詔免餘干有一富人作社火迎五聖遂三次往行在看拜郊畫成圗歸裝官家駕出迎神呼八千人為細甲軍皆用金銀二紙為之鹵簿儀衛俱全又裝一人儼然赭袍坐於輦上後州郡因訴詞取社首數十人囚死之此等真怪事所以迎神社火有禁故有意也貴耳集卷下
