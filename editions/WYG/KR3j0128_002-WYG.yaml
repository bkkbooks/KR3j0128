body:
  text: 貴耳集卷中宋張端義撰貴耳二集續成余謫八年强自卓立惟恐與草木俱腐著書垂世又犯大不韙志非抑鬱而怨于書也又非臧否而諷于書也又非譎怪而誕于書也隨所聞而筆焉微有以寓感慨之意而渡江以來隆紹間士大夫猶語元符宣政舊事淳熙間士大夫猶語炎隆舊事慶元去淳熙未逺士大夫知前事者漸少嘉定以後視宣炎間事十不知九矣况今端淳乎使貴耳集不付子雲之覆醬瓿幸也淳祐四年十一月八日東里張端義書紹興三十二年夀皇登極諸路帥臣監司郡守進貢總數為金約百五十兩為銀約一十九萬一千七百六十三兩有奇為絹約三萬四千五百疋為馬約五十匹此許及之諌藁内載契丹有玉注碗毎北主生辰稱夀徽考在御甞聞人使往來知有此注意甚慕之自恥中國反無此器遂遣人于闐國求良玉果得一璞甚大使一玉人為中節往遼覘其小大短長如其制度而琢之因聖節北使在庭得見此注目睨之久歸遼首問玉注安否北朝始知中國亦有此注女真滅遼首索此注及靖康金人興師亦索此注與遼注為對今又不知歸䝉古否髙宗南渡有將水晶注碗在𣙜塲交易髙宗得之泣下云此哲廟陵寢中物也太后諡聖字者垂簾典故用四字諡慈聖光獻曹后宣仁聖烈髙后欽聖獻肅向后昭慈聖憲孟后憲聖慈烈吳后恭聖仁烈楊后章獻明肅劉后保佑仁宗十二年之政諸賢在朝天下泰和諡不及聖字或者議有玉泉長蘆之䜟起于側微更于深知典故者訂之章獻屬疾語于仁宗曰願與祖宗同日為忌三月二十九日上仙乃太宗大忌後仁宗亦同前為翁婦後為母子此亦國朝之異事孝廟在御北使進國書必起御座三歩中貴取進忽賀正使至殿上去御座數十歩必欲屈萬乘親臨移時不决知閣王抃忽撒起國書云駕興北使失儀而孝廟喜王抃之機捷孝廟聖語云在朝無一人乞斬北使者毘陵丁逢以選人上書乞斬北使不執臣禮以存中國之體孝廟大喜即改京秩京師大相國寺有術士蜀人一命必得千隔夕留金翼朝議命顯肅后父鄭紳貧無藉有姪居中在太學為前廊姪約叔同往議命叔笑曰何不留錢沽酒市肉耶强之乃往如其所約術士先說紳命只云異姓真王再云居中命又云亦是異姓真王因前命而發紳以后貴積官果封王居中作相亦封華原郡王外戚生封王爵者自紳始夀皇在御秀邸凡有差除未嘗直降指揮于差勅内必首稱面奉徳夀皇帝聖旨除某人至今秀邸差劄可考祖宗典故同姓可封王不拜相藝祖載諸太廟獨趙忠定特出此典故隨筆卻稱云不受相麻而除樞密使三洪家素知典故者亦及此未曉也本朝年號或者皆曰有䜟緯于其間太平有一人六十卒字太宗五十九而止仁宗劉后並政天聖曰二聖人明道曰日月同道徽宗崇寧錢上字蔡京書崇字自山字一筆下寧字去心當時有云有意破宗無心寧國靖康曰十二月立康王嘉泰曰士大夫皆小人有力者喜宣仁太后勸神廟不可輕用兵當以兩國生靈為重縱使獲捷獻俘不過主上坐正殿受賀而已生靈肝腦塗地萬萬矣此真女主堯舜神廟自此兵議少息本朝四帝亦有吉符真宗即來和天尊出楊礪之夢載諸國史祥符崇尚道敎建立宫觀專尚祥瑞王欽若獻芝草八千一百三十九本丁謂獻芝草三萬七千餘本獨孫奭不然其事真宗久無嗣用方士拜章帝所有赤脚大仙辭之久玉帝云當遣幾箇好人去相輔贊仁宗在禁中未嘗尚鞋惟坐殿方尚鞋韈下殿即去之慶厯諸賢皆天人也徽宗即江南李王神宗幸袐書省閱江南李王圖見其人物儼雅再三歎訝繼時徽宗生所以文彩風流過李王百倍及北狩女真用江南李王見藝祖時典故髙宗韋后生徽宗夢錢王再三乞還兩浙夢覺與鄭后言朕夜來被錢王取兩浙甚急鄭后奏云昨夜韋后誕髙宗及建炎渡江今都錢塘百有餘年豈非應乞兩浙之夢乎夷門志載宣和間禁中有物曰􅀈塊然一物無頭眼手足有毛如漆中夜有聲如雷禁中人皆曰􅀈來諸閣分皆扃户徽廟亦避之甚至登上金坐移時或往詣嬪妃榻中睡以手撫之亦温煖曉則自榻滚下而去罔知所在或宫妃夢中有與朱温同寢者即此􅀈也或者云朱温之厲所化左傳云豕人立而啼未必誣也孝廟將授受于光廟擇正月使人離闕選日講行大典孝廟與周益公云二月一日日蝕避正殿未滿旬日有此典故恐非新君所宜朕自當之俟日蝕後别擇日外廷俱不知之太子春坊姜特立來謁益公云宫中已知人使離闕廷便講授受之典寂然不聞益公正色答云朝廷大事外廷豈可預聞恐非春坊所當言自此譖言先入益公相光廟不數月而免今平園有光廟御書跋語載之甚詳孝廟欲除張說簽書樞密事在廷諸儒力爭孝廟一日盛怒與周益公言朕將用花臂膊者為樞密使益公答云臣敢為天下倡祕書省正字沈瀛當輪對一奏劄薦張說反不稱旨即自免周益公後至宰輔沈正字止如此識見淺深亦足以卜前程逺近夀皇一日過南内有唐突人通州髙柟在望仙橋裏山呼夀皇止輦問理㑹何事奏云訴分即時降旨送棘寺夀皇取案牘自閱内有一臺官貽書即時國門呉邑令趙善宣卻金不受特轉一官訟無半月而决夀皇斷獄如此聖明蕭鷓巴恭奉孝廟擊毬每聖語許除步帥久不降㫖孝廟亦以北人不欲處三衙忽鷓巴醉中語侵孝廟云官家㑹亂說許臣除步帥數次久不降㫖孝廟怒送福州居住居數月徳夀忽語孝廟云蕭鷓巴如何不見孝廟舉前說奏知徳夀云北人性直官家不當戲之唤取歸來徳夀賜錢五千緡仰福帥津遣赴闕仍舊還職及徳夀發引日鷓巴號哭于路欲絶北人歸順本朝真終始而不變者也秦檜一日瞻髙廟天顔不恱奏云何事上勞聖慮答云郊祀匹帛闕五百萬支散臣當為陛下任此事忽一日奏云乞禁中賜臣酒四金壺將某日宣賜秦約張韓二將來議事自朝至午未間未得謁入但見中使宣賜御酒來心愈惑且驚移時秦與張韓進並不發一語忽云御前賜酒同飲一杯張韓奉巵戰慄不敢飲秦先取酒飲一勺少定緩云主上要與二將各假一千萬緡以奉郊祀祭畢後撥賜張韓謹奉令奏知髙廟得㫖止假五百萬緡首當是秦㑹之孝宗末年宰相奏試館職聖語云可求二人逺方人試呉臘字徳夫潭州人項安世字平甫荆南人後徳夫為四川宣諭使曦變化息安丙新有復蜀之功聲勢赫赫徳平時輕財重義適徳誕日安致餽玉帶一條直數千緡與幕屬宴有一客云安相公玉帶可得觀否徳夫發匣而示之客撫之良久徳夫取酒來舉帶為客夀安聞之始服其量徳夫歸自蜀至歸峽間泊舟呼其主帑者可具隨行信匣數來近得四千枚乃與諸客言某入蜀之初諸處致餽本不欲受恐以某絶物受之未甞啟封行歸田里何以見親舊四方書來或従婚𦵏見告某未有以應之今得䇿矣呼書吏來寫掩帖某人幾掩幾匣但不必問其物亦賭采耳弟道夫至首詢其兄出蜀何以伏臘計徳夫舉餘掩匣與之徳夫一世偉人凡所舉動必異于人如此劉岑字季髙官至侍郎髙宗時召従臣未達時貧甚用選官圗為下飯飢時以水沃飯一擲舉一匙如此苦淡常云不曽為小人事下棋時未能不為小人也能知人緩急在朝几受人所託事了無書但與來介云傳語官人説事已了不及作書若得書則事未了諸朋友多以不得書為喜帥維揚日有一舊同官之子以父未𦵏為請季髙戚然興念扣之買山幾何礱甃幾何緇黄不湏問其子歴歴具陳此某之責吾友且留相伴密使一親信人齋數百緡往其家買山辦其終事兩月親信人回始與其說喪已舉矣子無慮方遣其歸季髙與人說觀子之氣太爽得錢必不従親為重此一事不了終為吾輩累不若留此而畢其事先友之志酬矣吁季髙真急義人也今之視座主之子孫邈若路人況同官之子乎荆公在鍾山讀書有一長老曰先輩必做宰相但不可念舊惡改壊祖宗格法荆公云一第未就奚暇問作宰相并壊祖宗格法僧戲言也老僧云曽坐禪入定見秦王入寺來知先輩秦王後身也武后亦女中之秦政也有三數事不可泯沒造一十八字埊為地􅖔為臣曌為照圀為國鄭漁仲云皆有所祖篆文纂中埊字出戰國䇿孔子廟堂記歐陽詢書有大周額價十倍于無額釋氏華嚴經序天冊金輪皇帝御製即武后也京下忽闕見錢市間頗皇皇忽一日秦㑹之呼一鑷工櫛髪以五千當二錢犒之諭云此錢數日間有旨不使早用了鑷工親得鈞旨遂與外人言之不三日間京下見錢頓出此宰制天下之小術也建炎之初敵勢未寧講和之使來必煩百官郊迎其書在廷失色秦相恬不爲意盡遣省部吏人迎之朝見使人必要褥位此非臣子之禮秦相待之甚當是日朝見殿廷之内皆以紫幕鋪滿北人無辭而退澹菴有薦賢錄首章謂上欲求詩人遂薦十五人以王庭珪為首晦翁亦以能詩薦此時伊洛之學未甚專門也太學有鼓占云無火災不出宰相開禧陳自強相端平鄭清之拜相丙申火焚太學櫺星門鼓占不驗矣又有鼓占云此非宴游之地乃是多文之所學中燕未甞來巢蚊獨多他處中庸大學二書朱文公或問解說學士書生以為理學之祖或者云出于漢儒之言天命之謂性率性之謂道修道之謂敎與易之繫辭云生生之謂易成象之謂乾效法之謂坤句法何異子路問强一章恐非子思之言如子之道四丘未能一焉仲尼曰子思孫也豈有孫可稱乃祖之名之字乎大學在明徳在新民致知格物治國平天下倒大功用後曰與其有聚斂之臣寧有盜臣此文漢儒之言雜入也大靈豆華山陳摶有靈豆服一粒四十九日不飢筋力如故顔色若嬰兒世罕得服之者華山陳真人而隱于睡小則亘月大則幾年方一覺馮翊羽士宼朝一事處士得睡之大畧還全神觀唯睡而已小童劉垂範往宼其徒以睡告劉坐寢外聞鼻鼾之聲雄美可聽曰宼先生睡有樂乃華胥調既有曲譜記如何劉以濃墨塗滿紙題曰混沌譜張乖崖自成都召還華山寄陳摶詩云世人大厎重官榮見我西歸夾道迎應被華山髙士笑天真喪盡得浮生种放往見陳希夷希夷曰君當富貴名聞天下又希夷嘗為卜𦵏地于豹林谷下不定穴既𦵏希夷見之云地固佳而稍後世當出名將其姪世衡果為名將談苑云陳摶字圖南唐譙郡人不第隱武當山辟穀鍊氣後居華山雲臺觀閉門髙卧經月方醒太宗召之雍熙初賜號希夷先生邵氏聞見錄摶長興中進士有大志隱武當山常乘白騾従惡少年數百欲入汴州中塗聞藝祖登極大笑曰天下定矣遂入華山居焉錢若水謁陳摶求相約曰過半月來至期陳邀入山齋山中一老僧擁衲附火錢揖之僧開目而已黙坐久之陳問僧曰如何僧搖頭曰無此等骨陳語若水曰吾見子神觀清粹謂可學神仙余見之未精不敢奉許决之老僧渠云子無仙骨但可作貴公卿亦急流勇退僧即麻衣道者真宗忽問陳摶國祚靈長之數陳奏云過唐不及漢紙錢使不得已先知紙錢之䜟太宗諭陳摶往見諸王至夀王邸即回云夀王門下皆將相張耆夏守贇楊崇勲皆登樞府左傳云取郜大鼎納于太廟非禮也榖梁傳云名從主人物從中國故曰郜大鼎也公羊傳云器從名地從主人楚有材晉實用之子儀之亂析公奔晉晉人寘諸戎車之殿以為謀主繞角之役楚師宵潰楚失華夏析公之為也雍子奔晉晉人與之鄙彭城之役楚遇于靡角楚師宵潰楚失東夷雍子之為也子靈奔晉晉人與之邢通吳叛楚至今為患子靈之為也賁皇奔晉晉人與之苗鄢陵之役楚師大敗楚失諸侯賁皇之為也子木曰是皆然矣註曰言楚亡臣多在晉表著叔向曰朝有著定㑹有表文有襘帶有結㑹朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也定十五年邾子來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎夏公薨仲尼曰賜不幸言而中石言于晉師曠曰石不能言或馮焉晉方築虒祈之宫叔向曰是宫也諸侯必叛君必有咎唐開元龍池聖徳頌石自鳴春秋傳怨讟動于民有非言之物而言廣明元年華嶽廟𤣥宗御製碑隱然有聲聞數里劉曜時石言于峽永嘉五年石言于平陽懐帝蒙塵建興五年愍帝蒙塵石言于平陽宣和間艮嶽成朱勔進太湖石有大者數千人輦不動徽考云此石必要官爵遂封為大將軍賜金帶横于石上石始輦動何異石言也雨雹罪藏氷繆矣此申豐答季武子之問叔向曰有讒鼎銘曰昧旦丕顯後世猶怠况日不悛其能久乎服䖍曰疾讒之鼎明堂位曰崇鼎一云讒者地名鑄于甘讒之地呉子札聘于鄭見子産如舊相識與之縞帶子産獻紵衣焉註云呉地貴縞鄭地貴紵宋公殺世子座傳惠牆伊戾告太子將為亂與楚客盟公囚太子太子曰唯佐也能免我召而使請日中不來吾知死矣按僖公五年晉獻殺世子申生一百九年殺世子二晉宋之君皆闇秦用趙髙殺扶蘇漢信江充戾園亦縊漢安帝信江充廢順帝唐宗以武后殺三世子明皇聽李林甫殺太子瑛文宗信劉楚材太子永暴薨昭六年宋寺人柳怨華合比乃坎用牲埋書而告公曰合比納亡人華臣盟于北郭公初信戾而殺世子後信柳而逐大臣宋之寺人能用牲為盟書以誣人為可畏也傳曰昔天子之地一圻列國之地一同註云一圻方千里一同方百里春秋云宋華合比出奔衞按秦任趙髙殺世子扶蘇誅大臣蒙恬李斯輩秦亡漢元帝任恭顯殺蕭望之張猛安帝任江京樊豐譖廢順帝桓帝任單超徐璜等殺李雲杜衆權歸宦官致黨錮之禍靈帝以張讓為父趙忠為母任侯覽王甫曹節段珪殺太后誅李膺陳蕃黄巾大起至小黄門蹇碩作元帥袁紹乘中外之憤盡誅閹人漢亦亡矣宋魏以降不可具書唐眀皇任髙力士雖將相亦厚結之肅代以後李輔國程元振魚朝恩吐突承瓘竇文場玉守澄牒陳洪志仇士良田令孜劉季述之輩毒亂宗社擢髪不足以續其罪續字必有來處莊叔以周易筮之遇明夷之謙明夷日也日之數故有十時亦當十位自王而下其二為公其三為卿註云日中當王食時當公平旦為卿雞鳴為士夜半為皂人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺日之數十自甲至癸日中盛明故以為王晉夢黄能曰昔堯殛鯀于羽山其神化為黄能入于羽淵註作熊賈逵曰熊獸也說文似豕山居冬蟄釋魚云鼈三足曰能汲冢瑣語云平公夢見赤熊國語曰夢黄熊鄭裨竈曰妃以五成註云陳顓頊之後故為水屬火畏水故為之妃火心星也水得妃而興陳則楚襄妃合也五行各相配合得五而成五及鶉火火盛水衰季氏介其雞郈氏為之金距介者搗芥子播其羽也或曰以膠沙播之為介雞鄭氏云介甲也為雞着甲莊子云紀渻子為王養雞及十日復望之似木雞唐明皇好鬬鷄貧者或弄木雞帝生酉歲鬬者兵象周索戎索索法也書序云九丘八索即此索也定四年分魯公以夏后氏之璜封父之繁弱繁弱弓也朱晦翁王伯昭琴說琴大絃散聲中黄鐘二太簇三仲呂四林鐘五南呂六黄鐘七太簇清若按中徽其所中之律為如此則是專以黄鐘為宫不復可遺想矣今世所傳琴曲五調余嘗以音律考之皆仲呂一均也宫調乃仲吕餘調倣此夫仲吕四月之律萬物長養之時作五絃之琴以歌南風其此之謂乎後人增為七絃乃加其清聲此段說仲吕一均又與前說不同均字鄭漁仲書略註云作韻也司馬公語元城曰因看三國志識破一事曹公平日之姦至此盡矣臨死作遺令令者世之遺囑也操之遺令諄諄數百言下至分香賣履之事家人婢妾無不處置獨襌代之事此子孫自為吾未嘗敎為之實以天下遺子孫自享漢臣之名姦雄雖死亦有術也操夜卧圎枕敢野葛尺許飲酖酒至一盞恐人報已揚此聲以誑人遺令又揚此聲以誑後世髙祖戚姬生趙王如意上以太子仁弱欲廢嫡立少張子房得畫計厚幣迎四皓怪問何為者四人各言其姓名上驚曰吾求公避逃我今何自従吾兒游乎曰今聞太子恭敬愛士故臣等來上曰煩公幸卒調䕶太子指示戚姬我欲易之彼四人為之輔羽翼已成難動搖矣良之為太子也深唐太宗建成元吉有隙以秦府多驍將密以金銀器結尉遲敬徳智略之士可憚者房𤣥齡杜如晦長孫無忌髙士㢘尉遲敬徳已而秦王竟以兵殺建成元吉太宗同髙祖取天下風響氣燄豈建成元吉所可當諸將勇武皆樂為用使漢太子有尉遲敬徳事未可知唐太宗有四皓建成元吉必不死矣唐武徳四年太宗作文學館召名儒十八人為學士皆用隋之舊臣杜如晦隋進士房𤣥齡隋羽騎校尉儲祕書于志寧蘇世長王世充右僕射薛收隋侍郎道衡之子禇亮陳後主召試為薛舉黄門侍郎姚思㢘陳吏部蔡之子仕隋為史官陸徳明陳大建中後主為太子集名儒入講孔頴達隋大業明經髙第授博士李元道未詳李守素隋末依王世充虞世南陳滅入隋大業中祕書郎蔡允恭顔相時無傳許敬宗正觀中除著作郎後在姦臣傳薛元敬隋部侍郎之子盖文達時與孔頴達專門受業蘇朂無傳此唐皆用陳隋舊人置之文學是以尊崇之使之究其用之勿疑也本朝太宗取諸國有名之士入𢎞文館修書如太平御覽太平廣記皆徐鉉陶穀之筆是亦祖唐之遺意盜亦有道黄巢後為緇徒曽住大刹禪道為叢林推重臨入寂時指脚之下有黄巢二字儂智髙雖邕州潰即逃往外夷方臘舊名朕此童貫改曰臘後亦不知所終就擒者非臘也薛道衡空梁落燕泥之句詩名昔昔鹽十韻樂苑以為羽調曲𤣥怪錄載籧篨三娘唱河鵲鹽曲又有突厥鹽黄帝鹽白鴿鹽神雀鹽疎勒鹽滿座鹽歸鹽唐詩媚賴呉娘唱是鹽更奏新聲利骨鹽謂之鹽者吟行曲引之類樂府解題謂之杖鼓曲也鄭漁仲通志總序不取班固作西漢自髙祖至武帝凡六世之前盡竊遷書不以為慙自昭帝至平帝凡六世之後資于賈逵劉歆復不以為恥有曹大家終篇則固之自為書也司馬談有其書而司馬遷能成父志班彪有其業而班固不能讀父書固為彪之子既不能保其身又不能傳其業其為人如此安在乎言為天下法郭尚賢躭書落魄自陽翟尉致事嘗云服餌引導之餘有二事乃養生之大要梳頭浴脚是也尚賢曰梳頭浴脚長生事臨睡之時小太平章子厚元和初簾前争事無禮責出知汝州錢穆父行詞云怏怏非少主之臣悻悻無大臣之節子厚後見穆父責其語太甚穆父笑曰官人怒雜職安敢輕行杖馬子方作守令幕下黄次山作啟與廟堂不入意自改云方四十九之年買臣自知其將貴當乙巳之歳淵明已賦其歸來固不敢自比于古人欲以此折衷于夫子黄大服建陽孟貫獻詩于世宗遂聯九品有藥性論其略曰性既感攝體従變通浮萍作楊花之義子紅莧為跛鼈之還丹呉鹽治饐秦麝去疳斷可識矣遜道者明水開山第一代通慧入定片時便知未來已往有一士人志誠懇請問自已功名遜答云待老僧及第時公也及第其人以為戲已大不樂而去後二十年唱第殿廷期集所拜黄甲推最少者拜年髙者問者適當年髙選衆推一少年者即遜道者名李彌遜狀貌與前身無異其人大驚急往西江明水問遜道已遷化年月即彌遜所生之年月二十七年中書舍人二十八歳見圜悟云遜師兄錯了也公不覺潸然淚下二十八歳便致其事年六十餘坐脫而逝珏琪皆孫也皎如晦請一村僧住長蘆疏云這般梵刹顧非些少叢林箇樣村僧豈是尋常種草要得門當户對還他景勝人奇一公長老生鐡面皮潑天聲價盡大地揑成院子未稱全提將河沙卻作衲僧不消一喝且看大光菩薩面樣卻朶根尊者家來撑沒底船擊起蘆花千尺浪全提末後句祝延玉葉萬年人丹經亦道家流始于離修養起于離坎離中虚坎中滿二陽中有一隂坎水也二隂中有一陽離火也離火中有水坎水中有火鄭漁仲亦云離中有真水坎中有真火水火二性相濟為用運于一身亦然心為離腎為坎心火下水濟腎腎水上火濟心此母子胎養法丹訣以辰砂煅出水銀砂屬離水銀即真水以水銀煉成靈砂水銀坎靈砂即真火要知内外交養法不出此坎離成都道人親說此妙術謝道人嘉州洪雅人嘗賦苕帚詩埽此圗清浄愈埽愈不浄欲要埽敎浄放下苕帚柄在彭州葛仙治洞中坐多有蛇纒身三五日不去移上深山中打坐忽一日以青褐寄觀主我去矣數日不知何往倚大石而逝觀主瘞之是日有一老持謝道人簡來取青褐老云偶相遇在閬州始知其尸解矣楊青不知何許人自云従軍遇異人來隱南華山中以縛茅為荸籠飲食寢處其間又當虎狼蛇虺出沒之地雖三更亦歸風雨不渝月湖何文昌異為廣幕校文惠州因遊羅浮至大石樓遇黄野人一見便言做得尚書年九十袖出一柑分食之月湖由是清健無疾後果如其言或云黄野人有云篾長三尺餘止一節授一篾于月湖問其孫未嘗有之嘗聞老儒言漢之周易不以乾坤為首卦然後知揚雄太𤣥經以中孚為首卦即漢之易卲堯夫云凡一代立國必有一卦一君亦有一卦所謂大横庚庚是也堯舜授受相傳至禹傳之子東坡云堯舜慮天下也深大禹慮後世也逺堯曰咨爾舜天之厯數在爾躬允執其中舜命禹人心惟危道心惟微惟精惟一允執厥中捨此别無他語禹之傳則曰有典有則貽厥子孫商書則曰垂裕後昆俾輔予爾後嗣啟廸後人周書則曰欲至于萬年惟王子子孫孫永保民啟佑我後人詩云干祿百福子孫千億既受帝祉施于孫子文王孫子有商孫子吁堯舜之世未嘗有一語及子孫則知天下乃天下之公器天下共之三代之後子孫之念重所以湯放桀武王伐紂周之平王東遷子孫賢不肖可知矣自秦漢以下哀殤恭冲悲夫文選昭明太子之所作昭明在梁時亦鬱鬱不樂移此志于文選考之集中諸公負一世名者皆不得其善終班固張華郭璞機雲嵇康潘岳謝靈運輩甞讀其詩感愴之言近似鬼語屈原離騷有山鬼國殤良可哀也戎州有蔡次律家于近郊山谷甞過之小軒極潔外種餘甘子因名味諫後王子平送橄欖于山谷詩曰方懐味諌軒中果忽見金盤橄欖來想共餘甘有瓜葛苦中真味晚方囘錢自漢以五銖行王莽罷小大錢改作貨載之建布貨泉乃令民且獨行大錢後魏鑄太和五銖梁有東錢西錢長錢周鑄五行大布錢一當十又鑄永通萬國錢一當十與五行大布並行唐鑄乾封泉貨寳錢一當十女真鑄太和錢一當十端平鑄錢一當五輦下置監鑄不及千緡費用朝廷萬緡不一月罷大錢皆非治世所當鑄大觀太和可以監也岳與秦為世讐每得秦氏一物必曰賊秦最有大利害處總領百官渡江以後秦㑹之収諸將兵柄時所建岳肅之一為此官八年有以此告則曰君命也則曰昔文及甫潞公之子㑹除長平使者力辭不受先臣所争不當有此官子受之是背父命終不肯拜岳失于不辭也籲天集載建皇子因激秦之怒苗劉之變尚新領兵突有此議自蹈危機岳引司馬公作運使曰乞仁廟建立皇太子事擬非其倫司馬公儒者岳勇將道不同矣張元呉昊姚嗣宗皆闗中人負氣倜儻有古俠士志題崆峒詩曰南粤干戈未息肩五原金鼓又轟天崆峒山叟笑無語飽聽松聲春晝眠又云踏碎賀蘭石埽清西海塵鸚鵡詩云好著金籠收拾取莫敎飛入别人家張呉徑之西夏范文正公追之不及獨表姚入幕府朝廷困西兵十餘年皆二人之力姚述懐詩曰大開雙白眼只見一青天後六十年有施宜生改名方南人也入大金曽為奉使來朝金主欲南牧登北髙峰發一語云北風甚𦂳次年金主來開禧有柳虛心過北境問其在南作何官答云發兩解博不得一官北云爾今要作何官曰要做翰林學士北即授此官凡嫚書之來皆其筆也王景文質興國人在上庠公私試必魁一日試文帝道徳為麗論終日閣筆欲袖卷出方擬議間忽有人曰天下之至美吾心之至樂景文得之一筆而就果為魁首其豪放不可及有何處難忘酒蠻夷太不庭有心扶白日無力洗蒼溟豪傑將斑白功名未汗青此時無一盞壯氣激雷霆又何處難忘酒姦邪太陸梁腐儒還有酈好漢總無張曹趙扶開國王徐賣靖康此時無一盞淚滴海茫茫何處難忘酒英雄太屈蟠時違聊置畚運至即登壇梁甫吟聲苦干將寳氣寒此時無一盞拍碎玉闌干何處難忘酒生民太困窮百無一人飽十有九家空人說天方解時和氣自豐此時無一盞入地訴英雄曾入張魏公幕有雪齋集何處難忘酒四篇詩句中有梅花二字便覺有清意自何遜之後用梅花不知幾人矣林和靖八首梅詩惟疎影横斜水清淺暗香浮動月黄昏可謂絶唱有作聽角詞五更角裏梅花調吹落梢頭那箇花又有云小窗細嚼梅花蘂吐出新詩字字香杜小山云窗前一樣尋常月纔著梅花便不同綠窗昨夜東風少開遍梅梢第一枝半夜梅花入夢香玉人和月嗅梅花紙帳梅花醉夢間夜寒無可伴移火近梅花惆悵後庭風味别自鋤眀月種梅花鷺鷥一名舂鋤爾雅註行如舂鋤山谷亦有詩獨雍陶一聨曲盡寫物之妙立當青草人先見行傍白蓮魚未知以屬玉為鷺鷥非也張冠之名甫號易足居士有文集十卷多従于湖交游豪放飄蕩不受拘羈淳熙間淮有三士舒之張用晦和之張進卿真之張冠之也寄荆南詩餘生自判一虛舟未審尋詩慰客愁梅欲飄零猶醖藉柳纔依約已風流闗心弟妹無黄犬入夢江湖有白鷗别後故人相念否東風應倚仲宣樓雉山周宗聖師成霅之長興人少年秀麗讀書善記議論古今落落可聽有詩髙逺愛作選格有梅詩曰采采芳梅枝瑣碎白雲姿在山千花怨出山百鳥啼操持思所寄轉趾述所思清披太始風寒應太虛月一日拂人衣三歲香不歇仕不得志晚年若有所遇如游仙散聖之徒徐肇祀其先人曰當夜半可祭盖俟鬼渡河之後作祭儀十卷云或祭于昬或祭于旦皆非所以鬼宿渡河為候而鬼宿渡河之後常在中夜必使人仰占俟之葉少藴云公巽博學多聞援證有據必不妄發惟洪文敏不然其説但載牛女渡河之説用少陵詩或者又曰鬼渡蕭闗則祭二者當與知禮者質之詩序曰國風雅頌分為四詩以元城公言之四詩自是四家魯詩本之申公齊詩本之轅固韓詩本之韓嬰毛詩本之毛氏漢四家詩各有短長如韓詩有雨無極篇序云正大夫刺幽王也首云雨無其極傷我稼穡浩浩昊天不駿其徳今未見申轅嬰詩久矣韓詩有四十一卷慶厯中將作簿李用章序之毛詩在四詩中之一詩也黄州黄陂縣有李藏器一軍朝廷養之既久初無他心因趙文仲與楊伯洪交承之間相失密與王旻謀說尚全作亂初意不過撼揚之下自安耳黄陂北軍初未嘗有叛志生計差豐重離土王旻無以復命一夕呼千人竄投徳安王昊開門納之又出數千人與干都統戰李虎自淮東來文仲出五十里迓之獨與李虎並轡而行謀滅王旻之口虎至即調王旻往均州去未數日王旻復囘王旻寨柵盡為虎軍所占王旻軍猶此擾擾虎旻二軍互争于市文仲彈壓不定呼王旻來議事李虎就馬上殺之南北兩軍巷戰縱火文仲見事勢急棄城宵遁李漕全家死見任官死者數人城中之火近旬不滅嗚呼懐相嫉之心稔天之禍借兵權而修私怨朝廷何負耶楊伯洪知黄州忽一日早飯覺有薄荷氣食之後疑素養白鷄黒犬就其内飼之鷄與犬俱斃有孫來前以匙數粒食之晚亦斃楊始驚急服解毒藥嘔血數升遂將庖者鞫之乃云童徳興授其藥庖則荆湖制司人復改為飯局童諭之藥不驗當以薄荷可發朝廷知之差中使齎金器宣賜兼撫問伯洪引庖者對中使自白本末中使亦驚復奏童徳興赴召慮事覺先飲藥而卒禮云私諱不出門二名不偏諱臨文不諱韓文公辯諱一論其說詳盡近年以來士大夫之避諱自避于家則可臨官因致人罪則未可趙清闕之父名不陋使客吏整一漏處呼而問之答曰今次修了不漏遂黥客吏趙文仲在楚趙倡家初至問其何來答云因求一碗飯方到此趙怒及其已名又及其父名立斬之陳立道知寧國府有新司法饒州人初參問其何往答云在安仁縣寓居徑入大慟于家廟屬吏輒稱先世之名為司法旁皇失措即尋醫而去楊煜之父名王休同鄉有老儒王休合改選郡吏不敢呈擬數年不調後鄭昭文當國始得改秩王立之父名蒙凡仕宦處必有一客吏先言相見時切莫道及蒙字丁寧再三可怪習尚如此但未能各家自刋禮部韻略耳嘗讀樊噲傳有販繒屠狗之徒能取公相之位深切喜之寧考在位三十年主上在御二十年通十八舉取士九千人今為朝廷任事者皆無科目人奉使王柟免銓使薜及大法過府許國白身人趙拱澄觀之徒趙范趙葵並不曽銓試全子才白身人王夬亨彭大雅余玠曽發解賈渉曽式中何元夀李曽伯皆任子下有姓名官職不稱者不載建業間園丁種梨曰蜜父種枇杷曰蠟兒新羅使者多攜松子賂公卿家問其名有玉角子龍牙子瓜最盛無如燕趙車騁擔列道路俱香彼人云未至舌交先以鼻選閩士赴科呉人赴調各以鄉産自誇閩曰茘支吳曰楊梅有題壁曰閩鄉玉女含氷雪呉郡星郎駕火雲古今治天下各有所尚唐虞尚徳夏尚功商尚老周尚親秦尚刑名西漢尚材謀東漢尚節義魏尚辭章晉尚清談周隋尚族望唐尚制度文華本朝尚法令議論耿南仲作廣東憲過梅嶺宿次水驛讀書聽蛙鳴厭之使虞侯傳語其聲愈閙用紙作釘緘其口蛙覆死不受虞兵傳語蛙仰死即是虞兵不曽傳語明日視之皆仰死至今沙水無蛙名山大川皆有神司之潯州一土神並無土偶像但有一木主長五尺餘半在地書云唐御史李伯行殿上庚艮羅列無一敢擅取者立見報應考之唐書無傳李珏閩人隨兄尉永新邑妓劉興祖貌不妍受納士女李以兄任滿欲歸適有江西漕試復留候試了而别劉有樓美潔李修讀其上及試劉津其行李捷至劉備犒捷之費李復來治省課居數月如京行囊色色取辦輦鏹束帛以壮其行祝李早擢第富貴無相忘省捷時犒倍之鄰里姍笑劉之愚李不來矣李還家一年無信鄰里昨笑者又復揶揄之忽一日李書至劉雖知李有來音猶未知李之可踐盟否李首謁令乞劉去籍令欣然予之夙有約事主母當恭孝撫兒女如巳子執釜鬵以奉朝夕使彼此可安可久李許其約歸近李舍先書問信主毋進退唯命主母知其來越二十里外迓之一見如妯娌然李今某處任此韶敎曾茂實言之廬陵王排岸之女孫眉目秀麗能琴棋弄翰墨失身富家常鬱鬱不樂慕名勝而終焉郡有朱淵未第其室寢廢家事不治經營一妾頗難其人鄰媪云王排岸女孫歸久試與官人謀之朱笑曰恐無此理行成以八百劵為質一至其家内外之事若素定七月十一二日夜夢入一宫有二黄袍中坐二姬左右云汝去久何未來耶見殿下有判官抱一簿寫端平幾年吉州解試榜王欲看判官云汝手濁未可看行三四里過小池塘碧色掬水濯手二小金龍繞指不下始得見簿前三名某人某人第三朱某且云過省及第二姬堅欲留黄袍云更展三年一姬奉玻璃碗酒一勺棗二枚一姬就首上取金鳯釵挿其首黄袍以一詩絳囊置之胷間寤也五鼓歴歴與朱言之相對驚詫朱云試已同往仰山炷香纔至廟與夢中所見更無少異玻璃碗見在後殿二姬如生但一姬首無金鳯釵祝者云七月十二三間失去還舍越一夕掲曉朱某第三名次年過省登第後三年王一疾而卒正符黄袍所展之數其弟夢王來云今為仰山第三姬也朱為南雄法曹自作一傳以紀其本末貴耳集卷中
