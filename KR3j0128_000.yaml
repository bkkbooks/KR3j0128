body:
  text: 貴耳集雜家類三雜說之屬提要臣等謹案貴耳集三卷宋張端義撰端義字正夫自號荃翁鄭州人居於蘇州端平中應詔三上書坐妄言韶州安置此書即在韶州所作每卷各有自序上卷成於淳祐元年序言生平接諸老緒餘著短長録一帙得罪後為婦所火因追舊事記之名貴耳集以耳為人至貴言由音入事由言聽古人有入耳著心之訓且有貴耳賤目之說也集末一條自序生平甚悉中卷成於淳祐四年下卷成於淳祐八年其書多記朝廷軼事兼及詩話亦有考證數條中卷之末綴王排岸女孫一條始涉神怪下卷則多記猥雜事故其序有稗官虞初之文也書中如論制誥引陸游南唐書載李煜詞臣有陶穀徐鉉考陶穀由晉漢周入宋未仕李煜南唐書亦無此文也論物從中國名從主人引公羊傳謂長狄謂善稻為伊緩考公羊傳乃吳謂善稻為伊緩不云長狄也論易卦謂漢之周易不以乾坤為首卦然後知揚雄太元經以中孚首卦即漢之易考卦氣起中孚見易緯稽覽圖即孟喜六日七分之法非易卦之次序也論春秋謂王安石黜春秋聖經故元祐諸人多作春秋傳自胡安定先生始考胡瑗仁宗時人不及見熙寧之制也論施宜生日射三十六熊賦謂熊即侯也非獸也案程史載金海陵王校獵國中一日而獲三十六熊廷試多士遂以命題則熊獸也非侯也論藝文類聚以雞為稽山子以驢為廬山公吳越毛勝作水族加恩簿祖歐陽詢之遺意也考此乃藝文類聚禽部獸部集録舊文非詢作也論伶官謂自漢武帝時東方朔以諧謔進案優施逺見春秋不始於朔朔自官太中大夫亦非伶人也觀其下卷大抵本江湖詩派中人而負氣好議論故引據非其所長往往顛舛如此然所載頗有軼聞足資考證其論詩論文論時事皆往往可取所長固亦不可沒焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
