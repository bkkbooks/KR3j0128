body:
  text: 貴耳集卷上宋張端義撰余從江湖遊接諸老緒餘半生鑽研僅得短長錄一帙秀巖李心傳先生見之則曰余有朝野雜錄至戊巳矣借此以助參訂之闕余端平上書得罪落南無一書相隨思得此錄增補近事貽書索諸婦報云子錄非資治通鑑奚益于遷臣逐客火之久矣余悒怏彌日歎曰婦人女子但知求全于匹夫斯文奚咎焉大抵人生天地間惟閒中日月最難得使余塊然一物與世相忘視筆硯簡編為土苴固亦可樂幸而精力氣血未衰豈忍自叛于筆硯簡編之舊對越天地報答日月捨是而何為耶因追憶舊錄記一事必一書積至百則名之貴耳録耳為人至貴言由音入事由言聽古人有入耳著心之訓又有貴耳賤目之說悵前錄之已灰喜斯集之脫藳得婦在千里外雖聞有此錄束緼之怒不及矣錄尾述其大略竊比太史公自序云淳祐元年十二月大雪日東里張端義序思陵偶持一扇迺祐陵御筆畫林檎花上一鸜鵒令曾覿進詩云玉輦神遊事已空尚餘奎藻寫春風年年花鳥無窮意盡在蒼梧落照中思陵感動出涕桯史所載康與之非也孝宗朝尚書鹿何年四十餘上章乞致其事上驚諭宰臣問其由何對臣無他顧徳不稱位故稍矯世之不知分者耳以此語奏上始遂其請在朝者皆以詩祖之何歸遂築堂扁曰見一盖取人人盡道休官去林下何曽見一人之句慈聖一日見神考不恱問其所以神考答曰廷臣有謗訕朝政者欲議行慈聖曰莫非軾轍也老身嘗見仁祖時策士大恱得二文士問是誰曰軾轍也朕留與子孫用神考色漸和東坡始有黄州之謫在臺獄有二詩别子由詩奏神考慈聖亦閱之曰聖主如天萬物春小臣愚暗自亡身百年未滿先償債十口無歸更累人是處青山可埋骨他年夜雨獨傷神與君世世為兄弟又結來生未了因柏臺霜氣夜凄凄風動琅璫月向低夢遶雲山心似鹿魂飛湯火命如雞眼中犀角真吾子身後牛衣愧老妻百嵗神遊定何處桐鄉知葬浙江西獄中聞湖杭民作解厄道塲屢月故有此語徽考寳籙宫設醮一日嘗親臨之其道士伏章久而方起上問其故對曰適至帝所值奎宿奏事方畢始達上問曰奎宿何神答曰即本朝蘇軾也上大驚因是使能之臣譖言不入雖道流之言出于戃恍然不為無補也夀皇未嘗忘中興之圗有新秋雨霽詩云平生雄武心覽鏡朱顔在豈惜甞憂勤規恢須廣大曽作春賦有曰予將觀登臺之熙熙包八荒之為家穆然若東風之振槁洒然若膏雨之萌芽生生之徳無時不佳又何羡乎炫目之芳華示徐本中命其校訂曽覿因譖徐云上春賦本中在外言曽為潤色夀皇頗不恱本中自知閣換集英殿修撰江東漕後許國用此典故換文階端平間試詞科出夀皇春賦頌試者皆不知之此無五十年間事士大夫罔聞之矣孝宗幸天竺及靈隱有輝僧相隨見飛來峰問輝曰既是飛來如何不飛去對曰一動不如一静又有觀音像手持數珠問曰何用曰要念觀音菩薩問自念則甚曰求人不如求已因進圓覺經二句使虚妄心若無六塵則不能有經本四字一句以三句合而為二句孝宗大喜有奎翰入石漢初黜申韓崇黄老盖公有曰治道貴清静仲舒三䇿本于黄老不失為儒者積至五七百年東晉清談之士酷嗜莊老以曠達超詣為第一等人物徳夀中興之後夀皇嗣服之時莊老二書未嘗不在几格間或得一二緇黄之講說息兵愛民不事紛華深得簡淡之道外廷儒者多以此箴規惟吕東萊言之甚切嘗讀中庸大學之書不當流異端之學殊不知聖心自與此理圓明雖曰異端自有理到處尊經之意不得不嚴章聖講周禮至典瑞有琀玉問之何義講官答曰人臣卒給之琀玉欲使骨不朽耳章聖曰人臣但要名不朽何用骨為徳夀與講官言讀資治通鑑知司馬光有宰相度量讀唐鑑知范祖禹有臺諫手段雖學士大夫未嘗說到這裏韋太后自北歸有四聖一圖奉之甚嚴委中官張去為建四聖觀秦相偶見之問所以然退以堂帖呼張去為張窘甚泣告太后思陵因朝退語及建四聖觀本末秦相奏云先朝政以崇建宫觀致有靖康之變内庭有所營造豈容不令外臣知之中貴自專非宗社之福即日罷役改為都亭驛後三年思陵諭秦相以孤山為四聖觀殿宇至今簡陋徳夀在南内夀皇奉親之孝極盡其意徳夀好遊樂夀皇一日醉中許進二十萬緡久而不進徳夀問吳后北内曽許進二十萬緡何不進來吳后云在此久矣偶醉中奏不知是銀是錢未敢遽進徳夀云要錢用耳呉后代進二十萬緡夀皇感呉后之意調娛父子之歡倍四十萬緍以獻本朝女后之賢皆類此也曽懐在版曹效蜀中造㑹子始得三百萬孝廟在宫中積三百萬見鏹準備换㑹三五年浙中粟賤造六百萬為和糴用繼後印造不止六百萬萬矣辛未以二易一當時議者必曰貽害于後今以五易一倍于二易一矣十七界不及六十七文行用殊不知十九界後出又將十八界以十易一矣此一項利害難以虚言勝愚民之術至此而窮學士大夫强出新奇欲行稱提之法愈稱提則愈折閱矣有一小喻子譬如寒士將一褐行質于子本家無錢可贖欲往其家講說語孟汝將所質見還天下必無此理今之稱提空談何異講語孟而取質也秦㑹之當國偶䖍州賊發秦相得報夜呼堂吏行劄數日以賊聞一日徳夀問䖍州有賊何不奏聞奏云小竊不敢上勞聖聽陛下何以知之上曰普安說秦既退呼堂吏云普安一宫給使請俸不齊取榜來遂閣兩月夀皇聖度髙逺亦不以此為意議者疏秦擅專之罪徳夀建思堂落成夀皇同宴問徳夀何以曰思堂徳夀答曰思秦檜也由是秦氏之議少息夀皇忽問王丞相淮及執政近日曽得李彦頴信否臣等方得李彦頴書紹興新造蓬萊春酒甚佳各㕔送三十樽夀皇曰此間思堂春不好宰執郤不敢受嘉定以來有珠玉之貢聞此可愧矣夀皇議遣湯鵬舉使北沈詹事樞在同列間發一語操呉音曰官家好獃此語遂達于上大怒差四從官審責沈曾與不曾有此語對云臣有此語即日謫筠州湯侍御史使北夀皇專差中貴𣅿𣅿等人使囘程先取國書星夜以聞夀皇得之啟匣元封不開國書復囘湯以專對失職得謫沈以先言有驗得歸石湖范至能成大以中書舍人為祈請使至北庭頗立節葛王臨辭有言曰天下是天下之天下有徳者得之但使宋帝修徳而已不憂天下之不歸夀皇所以聖徳日新基於此也夀皇欲除知閣張說簽書樞宻院在朝諸公力爭獨石湖不答或者皆疑之忽一日夀皇語及張說石湖奏云知閣如州郡典客不應使典客便與知閣通判同列何以令衆庶見夀皇感悟遂寢此除易曰納約自牖此之謂也周益公以内相將過府夀皇問欲除卿西府但文字之職無人可代有文士可薦二人來益公以龎祐甫崔敦詩薦上問曾見他文字否公云二人皆有所業内銃歌甚好可進來是年適郊祀公即日進入夀皇後與公言龎之文不甚温潤崔之文頗得體崔自運司斛面官除祕書省正字兼翰林權直權直自崔始孝宗萬幾餘暇留神棊局詔國手趙鄂供奉由是遭際官至武功大夫浙西路鈐因郊祀乞奏補懇祈甚至聖語云降㫖不妨恐外庭不肻放行久之云卿與後省官貟有相識否趙云葛中書臣之㤙家試與他說看趙往見葛具陳上言答曰爾是我家裏人非不要相周全有礙祖宗格法技術官無奏薦之理縱降㫖來定當繳了後供奉間從容奏曰向蒙聖㫖今臣去見葛中書具說堅執不從夀皇曰秀才難與他說話莫要引他趙之請乃止夀皇聖明非特處君子有道雖處小人亦有道也葉丞相顒與林安宅最厚嘗有簡往來丞相之子用林簡粘于壁林後謁丞相見之不樂而去林後除察院首章論丞相由是去國疏上事以風聞彼時君臣得以自通葉抗章自辨夀皇付棘寺窮究林之所言乃是葉衡丞相之事林以誣罔得謫葉再相孝皇同㤙平在潛邸髙廟乃書蘭亭序二篇賜二王依此様各進五百本孝皇書七百本上之㤙平卒無所進髙廟賜二王宫女各十人普安問禮之當何如史浩云當以庶母之禮待之髙廟問二王待遇之狀言普安加禮㤙平無不昵之者大計由此而決殿司軍籍闕招三千人諸軍掠人于市行都騷然有軍人秦忠楊忠擅入胡珍家毁擊器具送棘寺上欲以軍人秦忠楊忠與百姓陸慶童皆從軍法史浩曰百姓自有常法豈可一旦律之軍法孝皇大怒浩奏陛下惟恐諸軍有怨言故必欲兩平其罪以安其心不思百姓不得其平其出怨言亦可畏也陳勝呉廣等死國可乎上變色震怒曰如此則以朕比秦二世也上拂袖徑降㫖宻院施行浩以自念備位宰相言不見聽使民無罪以死法即奉祠相不及數月而去莫濟宰錢塘春暮有一老兵醉入縣咆哮無禮不問其從來杖而去之即徳夀宫幕士也大璫奏知髙廟大怒宣諭孝宗莫濟即日罷一年後偶常州闕守宰執奏欲得有風力之人可以整頓凋弊孝宗云朕有一人向曽打徳夀宫幕士者莫濟也即知常州莫纔作邑及年而得郡孝宗不次用人如此憲聖在南内愛神怪幻誕等書郭彖暌車志始出洪景盧夷堅志繼之唐已有此集三卷夷姓堅名也宣和間有奉使高麗者其國異書甚富自先秦以後晉唐隋梁之書皆有之不知㡬千家㡬千集盖不經兵火今中祕所藏未必如此旁搜而博蓄也南軒自桂帥入朝以平日所著之書并奏議講解百餘册裝潢以進方鋪陳殿陛間有小黄門忽問左司甚文字許多張南軒斥之曰敎官家治國平天下小黄門答云孔夫子道一言可以興邦孝宗聞此言亦笑東萊修文鑑成獨進一本于上前滿朝皆未得見惟大璫甘昺有之公論頗不與得㫖除直祕閣為中書陳騤所繳載于陳之行狀哲廟紹聖四年進八寳改元符元年至三年泰陵上仙嘉定十七年得皇帝恭膺天命之寳盧祖皐在玉堂草詔用元符典故太學前廊茅彚征與盧言詔不當用元符事盧始驚茅不願推寳賞改崇慶元年至三年茂陵上仙其亦偶然相符如此濟邸擇妃大璫王俞來宣押憲聖之姪孫女獨尊長節度使呉鑄不恱同姪孫女辭家廟鑄乞與大璫言乞奏知中殿臣家自有憲聖可以主張門戸甚次第光輝不藉此女只有疎脫大璫云只是官家中殿聖意節使如何有此說鑄云他父母不曉事非鑄本心他日必為憲聖累莫道鑄不曽說後有黄冠之命鑄亦可謂賢矣宣和間有詔表云語忌詔文朕篤奉先烈表云陸下徳邁九皇劄皇子文有克長克君此劉嗣明撰也容齋隨筆云京師二吏一翰林孔目官不肻進克長克君之文一太常書史劉珏奏用祭服克軍褐吏云在禮祭服弊則焚之雖國家危迫不當以常時論然容臺秉禮俟朝廷索則予之賢于背禮而先獻也泰陵書戒石銘賜郡國曰爾俸爾祿民膏民脂下民易虐上天難欺用蜀檮杌中所載孟王昶文云朕念赤子旰食宵衣言之令長撫養惠綏政存三異道在七絲驅雞為理留犢為規寛猛得所風俗可移無令侵削無使瘡痍下民易虐上天難欺賦輿是切是國是資朕之賞罰固不踰時爾俸爾祿民膏民脂為民父母莫不仁慈勉爾為戒體朕深思凡二十四句昶亦可稱後熙陵表出言簡理盡遂成王言趙忠定庚申生韓平原壬申生繼庚申史忠獻甲申生繼壬申鄭左相丙申生繼甲申四申相乘自古罕有癸丑狀元陳亮死之乙丑狀元毛自知降第五甲丁丑狀元吳潛造闕後遭論四十年間有四申三丑之驗遭論恐作遭謫嵩山祖宗陵寢所自靖康之後所存特昌陵而已紹興間榷塲通貨持陵寢中寳器來思陵嘗得之為之出涕所以孝宗日夜不遑欲恢復故土志在此也端平初金人失國䝉古許本朝遣使朝陵使未至陵三京之師一出䝉古大怒盡將陵廟犂為墟矣七廟何其不幸耶自古以來地勢自北而南江流自西而東金亡都汴燕趙青齊之野皆成草莽上蔡天地之中氣三十年來地氣不乘兵革日尋民無生意蜀自晉未嘗經殘破嘉熙戊戌北兵四至如入無人之境成都一夕焚盡死者何止百萬人至今不容經理北兵往來未巳地之氣今為不毛江之源今為汚濁不幸江左當地勢之南江流之東建瓴之勢為敵國得之李唐樊若水嘗駕小舟以絲量江面闊狹之數獻于太祖後曹王正用此䇿下江南國史載之甚詳不意百有四十年後髙廟中興駐蹕臨安自淮以北非吾土也昔時以汴京為萬世不拔之業誰知建炎至今宴安江沱萬一敵國儻用若水之說如之何本朝故事宗室不領兵盖因真皇澶淵之幸髙皇靖康之變以皇子除兵馬大元帥定建炎中興之業嘉定間趙善湘開金陵制府誅李全識者有宗室不領兵之議遂有行宫之謗嘗記帥逢原為池州軍帥有一士挾南班書見之書史云祖宗典故管軍不受宗室書恐違制近來兵將皆受宗室薦舉矣自渡江以前無今之轎只是乘馬所以有修帽䕶塵之服士皆服衫帽凉衫為禮紫衫戎服也思陵在維揚一時擾亂中遇雨傳㫖百官許乘肩輿因循至此故制盡泯今臺諌出臺親事官用凉衫略展登轎尚存舊制他無復見之紹興乾道間都下安敢張盖雖曽為朝士或外任監司州郡入京未嘗有盖只是持袋扇障日開禧間始創出皂盖程覃尹京出賞嚴皂盖之禁有越士張盖過府門遂為所治後學中有詩云冠盖相望自古傳以青易皂已多年中原數頂黄羅傘何不多多出賞錢時山東盜賊紛起故有此詩也掖垣非有出身不除以䕃子除者三人王秬初寮之孫韓元吉桐韓之孫劉孝韙皆爲之自嘉泰嘉定以來百官見宰相盡不納所業至端平銜袖書啟亦廢求舉者納脚色求闕者納闕劄而已文人才士無有自見碌碌無聞者雜進三十年間詞科又罷兩制皆不是當行京諺云戾家是也不過人主上臣下一啟耳初無王言訓誥之體如拜平章二相三制豈不有慙于東坡如改元災異罪己諸詔豈不有愧于陸䞇因讀陸放翁南唐書李王小國耳自有陶榖徐鉉錢王尚有羅隱不意堂堂中國不能得一士如小國之陶徐兩浙之羅隱者良可歎也本朝大儒皆出于世家周濓溪以舅官出仕兩改名先名宗實因英廟舊名改後名惇頤又以光宗御名改二程父為别駕南軒張魏公之長子文公朱郎中之子奉使朱弁之姪東萊吕樞密之孫致堂胡文定公之子惟横渠象山士子也張魏公開建業幕府有一術者來謁取辟客命推算術者云皆非貴人公不樂曰要作國家大事幕下如何無三五人宰執侍従此亦智將不如福將也魏公之客虞雍公雍公之客王謙仲范宗尹之客賀宗禮皆宰執也開禧畢再遇帥揚起身行伍驟為名將亦非偶然麾下有二十餘人都統制殿帥四人則知魏公推命之不誣也伊川濓溪一世道綂之宗用大臣薦為崇政殿說書以帝王之學輔贊人主儒者所望自范文正公論事始分朋黨伊川則曰洛黨如朱光庭賈易附之力攻蜀黨蘇氏父子也朝廷大患最怕攻黨小人立黨初不是專意宗社計借此隂移人主禍福之柄竊取爵祿而已如君子不立黨伊川見道之明未能免焉淳熙則曰道學慶元則曰偽黨深思由來皆非國家福沿邉有州縣城池處揚楚天長六合東淮之控廬和巢縣西淮之控襄陽江陵徳安荆鄂之控嘉定始議諸州縣築城東淮則通泰髙郵盱𣅿鹽城興化西淮則蘄黄舒濠無為安豐定逺固始鍾離京襄則棗陽隨復荆門漢陽光化城池日就兵力日分渡江之後髙宗孝宗非不神武聖慮非不宏逺獨注意揚楚廬和襄陽城壁而巳不欲修沿邊諸城慮敵人萬一得之恐為家基彼若堅守此必難取如盱眙一失無計可取後說以貨而歸之初未嘗以兵而復也不幸楚州毁于許國劉倬蘄黄毁于太何節襄陽失于趙范悵念襄楚二城版築之用金粟與城齊矣此三朝留神之地一旦棄毁誠為國家惜舜典曰八音克諧無相奪倫神人以和自宣政間周美成柳耆卿輩出自製樂章有曰側犯尾犯花犯玲瓏四犯八音雜律宫呂奪倫是不克諧矣天寳後曲遍繁聲皆曰入破破者破碎之義明皇幸蜀宣和之曲皆曰犯犯者侵犯之義二帝北狩曲中之䜟深可畏哉張子韶曰一吁一俞治亂所闗放齊舉丹朱曰吁驩兜舉共工亦曰吁使堯俞之則小人得志師錫虞舜堯曰俞僉舉伯禹舜曰俞使帝吁之則君子之道消矣可吁則吁故天下莫不畏可俞則俞故天下莫不服獨樂園司馬公居洛時建東坡詩曰青山在屋上流水在屋下中有五畝園花竹秀而野有園丁吕直性愚而鯁公以直名之夏月遊人入園㣲有所得持十千白公公麾之使去後幾日自建一井亭公問之直以十千為對復曰端明要作好人在直如何不作好人可以為渡江以來相府厮役者之勸毛詩聖人取小夫賤𨽻之言最于人情道理處誠使人一唱三歎如山有樞三章聞之者可以為戒言衣裳車馬宛其死矣他人是愉言鐘鼔宛其死矣他人是保言酒食宛其死矣他人入室愉保猶可說至于入室則鄙吝之言極矣東坡天人也凡作一文必有深㫖撰小兒致語云自古以來未有祖宗之仁厚上天所佑願生賢聖之子孫其意深切著明元祐初司馬公薨東坡欲主喪遂為伊川所先東坡不滿意伊川以古禮斂用錦囊囊其尸東坡見而指之曰欠一件物事當寫作信物一角送上閻羅大王東坡由是與伊川失歡東坡㑹葬有齋筵李方叔作致語云皇天后土鑒一生忠義之心名山大川還千古英靈之氣蜀有彭老山東坡生則童東坡死復青東坡在儋耳無書可讀黎子家有柳文數冊盡日玩誦一日遇雨借笠屐而歸人畫作圗東坡自贊人所笑也犬所吠也笑亦怪也用子厚語東坡因訪吕微仲偶在書屋坐久因見盆中養一龜有六目微仲出與東坡言偶晝寢久坐東坡云盆中之龜作得一口號奉白莫要閙莫要閙聽取龜兒口號六隻眼兒睡一覺郤比他人睡三覺呂大笑宣和元夜上幸端門近臣皆進詩有問王岐公用甚故事答以鳯輦鼇山問者不樂而去誰不知鳯輦鼇山故相謔耳岐公進詩云雙鳯雲中扶輦下六鼇海上駕山來聞者歎服作詩要融化豈可執而不通紫巖張公謫居永州二水憂國耿耿一日慨然作丸墨笻杖銘墨之銘曰存身于昏昏而天下之理固已昭昭斯為瀟湘之寳予將與之消搖笻之銘曰用則行舍則藏惟我與爾危不持顚不扶將焉用彼种放見陳圖南曰意謂子有仙風道骨奈何尚隔一塵一塵謂五百年也他日必白衣作諫議然名者古今之美器造物者深忌于天地間無全名子名將起物必敗之放晚節果如圖南所言南宫舍人果是不好作的官職每歲賀雪表尤難下筆曽有一聨云普天咸有率土莫非此何等語也周益公與韓无咎同賦詞科試交趾國進象表有備法駕之前陳此无咎句也益公止改陳字作驅字遂中大科陳字不切驅字象上有用又用拜舞周章出本草註綦内相崇禮在太學前廊裕陵有進枸杞根如犬大作賀表學官令前廊撰述皆不下筆綦欣然當之其用一句靈根夜吠舉學皆服用東坡詩云靈厖或夜吠又出白樂天枸杞詩因此後登玉堂余外祖王詷子文上蔣子禮除右相啟曰早登黄閣獨見明公之少年今得舊儒何憂左轄之虛位皆用杜詩語扈聖登黄閣名公獨少年左轄頻虛位今年得舊儒為洪文敏稱賞載之隨筆李大異為廣西憲庚申年謝厯日表云歲次庚申乃藝祖開基之日朔臨戊子是吾皇誕聖之辰當年正月一日戊子即茂陵元命用得親切旋召入舎人院楊冠卿館于九江戎司趙溫叔罷相帥荆南道由九江守帥合宴楊作致語云相公倦台鼎喜看衮繡之東歸潯陽無管絃且聽琵琶之舊曲溫叔冄三稱道蜀中敎官作上已日致語云三月三日多長安之麗人一咏一觴修山隂之舊事要作駢儷當如此用事喬平章為左相時己年八十餘因榜府門曰七十者許乞致仕為一輕薄子書一詩于右曰左相門前有指揮小官焉敢不遵依若言七十當致仕八十公公也合歸因是卷榜而入鄭衛之音皆淫聲也夫子獨曰放鄭聲不及衛音何也衞詩所載皆男奔女鄭詩所載皆女奔男所以放之聖人之意微矣朱希真南渡以詞得名月詞有揷天翠柳被何人推上一輪明月之句自是豪放賦梅詞如不食烟火人語横枝銷瘦一如無但空裏疎花數㸃語意奇絶詞集曰太平樵唱趙介菴名彦端字徳莊宗室之秀能作文賦西湖謁金門波底夕陽紅縐阜陵問誰詞答云彦端所作我家裏人也㑹作此等語喜甚有介菴集三卷易安居士李氏趙明誠之妻金石錄亦筆削其間南渡以來常懐京洛舊事晚年賦元宵永遇樂詞云落日鎔金暮雲合璧已自工緻至于染柳烟輕吹梅笛怨春意知幾許氣象更好後疊云于今憔悴風鬟霜鬢怕見夜間出去皆以尋常語度入音律鍊句精巧則易平淡入調者難且秋詞聲聲慢尋尋覔覔冷冷清清凄凄慘慘戚戚此乃公孫大娘舞劒手本朝非無能詞之士未曽有一下十四疊字者用文選諸賦格後疊又云梧桐更兼細雨到黄昏㸃㸃滴滴又使疊字俱無斧鑿痕更有一奇字云守定窗兒獨自怎生得黒黒字不許第二人押婦人中有此文筆殆間氣也有易安文集劉季孫左班殿直監饒州酒荆公為江東憲廵部至饒因按酒務屛間一詩云呢喃燕子語梁間底事來驚夢裏間說與旁人渾不解杖藜攜酒看芝山大稱賞之郡生持状乞差官攝學事荆公判監酒殿直一郡皆驚劉名遂著趙嗣良絳人也以能文為裕陵眷遇曽兼史局如通鑑長編重和元年十二月推修四朝㑹要帝系后妃吉禮三類賞嗣良以參詳轉秩後竄囘北上京破有詩曰建國舊碑邊月暗興王故地野風乾囘頭笑向王公子騎馬隨軍上五鑾此殿曰五鑾乃保機之故巢也北人張侍御有侍兒意狀可憐乃宣和殿小宫姬也又翰林吳激賦小嗣云南朝千古傷心地還唱後庭花舊時王謝堂前燕子飛入誰家恍然相遇仙姿勝雪宫鬢堆鴉江州司馬青衫溼淚同在天涯衞元卿洋州人曽領薦不得志遊山谷間作謁金門詞曰花過雨又是一番紅素燕子歸來愁不語故巢無覔處誰在玉樓歌舞誰在玉闗辛苦若使邊塵吹得去東風侯萬戸北狀元汪世顯者鳯翔帥隨䝉古統兵入蜀綿州道中題詩云擁騎南來春正濃鞭弰輕拂杏花紅綠林戰退千山月細柳横拖一巷風玉勒有時閑駿馬錦縧無力挂弨弓六軍休動三衙鼓夢在池塘春思中唐李頎詩云逺客坐長夜雨聲孤寺秋請量東海水看取淺深愁且客逺在秋暮投孤村古寺中夜長不能寢起坐悽惻而聞雨聲其為一詩襟抱以海喻愁非過語也春水滿四澤夏雲多奇峰秋月揚明輝冬嶺秀孤松淵明詩絶句之祖一句一絶也作詩有句法意連句圓有云打起黄鶯兒莫敎枝上啼幾回驚妾夢不得到遼西一句一接未甞間斷作詩當參此意便有神聖工巧作文之法先觀時節次看人品又當玩味其立意如退之作柳子厚墓銘自士窮而見節義三四十言皆自道胷中事如東坡韓文公廟碑有云匹夫為百世師一言為天下法此豈非東坡之自課乎或者議退之不當作符讀書城南與原道出二手嵩山極峻法堂壁上有一詩曰一團茅草亂蓬蓬驀地燒天驀地紅争似滿爐煨榾柮慢騰騰地煖烘烘字畫老草旁有四字勿毁此詩此司馬公書柱間大隸書旦光頤來旦公兄頤程正叔也壁門題云登山有道徐行則不困措足于實地則不危皆公八分書陸放翁茶山上足自劒南藁後有萬餘首詩在京樓有詩曰小樓一夜聽春雨深巷明朝賣杏花橋南書院云春寒催唤客甞酒夜静卧聽兒讀書感秋云玉階蟋蟀吟深夜金井梧桐辭故枝櫽括道藏語也蕭千巖亦師茶山有樵夫詩云一擔乾柴古渡頭盤纒一日頗優游歸來澗底磨刀斧又作全家明日謀乃寓茍且一時之意周希稷名承勲周益公甚前席之有端午一詩殊有諷刺誰家解祟吐千缾丹墨交輝走百靈盡使鼃蛇歸藥籠又纒蕭艾作人形逸二句安得綵絲十萬丈東南西北繫飄零吐崇干缾出太𤣥經趙昌父名蕃號章泉鄭州管城人與益公同里也益公當軸所仕但一酒官耳五十年不調居信上一時名勝納交户外之屨常滿放翁皆有詩夀九十餘公朝尊老以祕閣正郎聘之不至石屛詩云君為山中人世事安得聞入山恐未深更入幾重雲王瀘溪廷珪作詩送胡忠簡謫新州囊封初上九重闗是日清都虎豹閑百辟動容觀奏牘幾人回首愧朝班名髙北斗星辰上身墮南州瘴海間豈特他年公議定漢庭行召賈生還大厦初非一木支欲將獨力拄顛危癡兒不了公家事男子要為天下奇當日姦諛皆膽落平生忠義只心知端能飽喫新州飯在處江山足䕶持有聞于申國坐以謗訕流夜郎時年七十阜陵初政召對特改承奉郎除國子監主簿堅不留乞祠而去告老于家夀九十有三項平齋自號江陵病叟余侍先君往荆南所訓學詩當學杜詩學詞當學柳詞扣其所云杜詩柳詞皆無表徳只是實說嘗為潭敎與帥啟云抆涙過故人之墓驚鬢髪之皆非倚杖看祝融之峰喜山色之如舊竹隱徐淵子似道天台人韻度清雅買硯詩云俸餘宜辦買山錢卻買端州一硯磚依舊被渠驅使出買山之事定何年遊廬山得蠏詩曰不到廬山辜負目不食螃蠏辜負腹亦知二者古難并到得九江吾事足廬山偃蹇坐吾前螃蠏郭索來酒邊持螯把酒與山對世無此樂三百年時人愛畫陶靖節菊遶東籬手親折何如更畫我持螯共對廬山作三絶淵子為小蓬朝聞彈疏坐以小舟載菖蒲數盆翩然而去道間爭望若神仙然秋塘陳敬甫善有雪篷夜話三卷淳熙間一豪士甞書貴家扇云春風一日歸深院巫峽千山鎖暮雲有滿江紅詞曰三月風前花薄命五更枕上春無力上李季章啟云父子太史公提千古文章之印玉堂真學士躋中朝公輔之班送輔漢卿過考亭詩云聞說平生輔漢卿武夷山下啜殘羮蒲江盧申之祖皋貌宇修整作小詞纖雅曰蒲江集曽為玉堂有感詩兩山風雨故留寒九陌香泥苦未乾開到海棠春爛漫擔頭時得數枝看有舟中獨酌詩山川似舊客懐老天地何言春事深松江别詩明月垂虹幾度秋短篷長是繫人愁暮煙疎雨分攜地更上松江百尺樓余領先生詞外之旨趙天樂葉水心四靈之友也名師秀字紫芝作晚唐詩野水多于地春山半是雲白石巖云起來閒把青衣袖裹得闌干一片雲又云有約不來過夜半獨敲棊子落燈花移居云筍從壊砌甎中出山在鄰家樹上青呈二友云禽翻竹葉霜初下人立梅花月正髙又云一片葉初落數聯詩已清冄移居云地僻傳聞新事少路遙牽率故人多廬陵劉過字改之有詞云行道橋南無酒賣老天猶困英雄南樓詞蘆葉滿汀洲寒沙淺帶流二十年重過南樓柳下繫船猶未穩能幾日又中秋黄鶴斷磯頭故人曽到不舊江山渾是新愁欲買桂華重載酒終不似少年遊上周相詩云太平宰相不収拾老死山林無奈何送王簡卿詩班行失士國輕重道路不言心是非又云事可語人酬對易面無慙色去留輕世事看來忙不得百年到手是功名有劉仙倫亦以詩名淳熙間有廬陵二劉翁卷字靈舒四靈也有曉對詩梅花分地落井氣隔簾生瀑布云千年流不盡六月地長寒春日云一階春草碧幾片落花輕遊寺云分石同僧坐看松見鶴來吾廬云移花連舊土買石帶新苔埜齋周晉仙文璞曽語余曰花間集只有五字絶佳細雨濕流光景意俱微妙題鍾山云往在秦淮問六朝江樓秪有女吹簫昭陽太極無行路幾歲鵞黄上柳條晨起云閉門不與俗人交𤣥晏春秋日日抄清曉偶然隨鶴出野風吹折白櫻桃有灌口二郎歌聽歐陽琴行金銅塔歌不減賀白余有挽晉仙詩載江湖集中銛朴翁秦望山人能詩詩愈工俗念愈熾後加冠巾曰葛天民築室蘇堤自號柳下即事云壁為題詩暗池因洗硯渾閒知真富貴醉到古乾坤清明訪白石云花薺懸燈柳揷檐老懐那復似餳甜畫船已載先生去燕子無人自入簾絶句云夜雨漲波髙一尺失卻搗衣平正石明朝水落石依然老夫一夜空相憶江頭送客云大江中夜滿雙櫓半空鳴後有羽軒李翔髙善為絶句盧蒲江甚愛之有云春愁自是無重數又被東風揭繡簾老子興不淺也二十四友金谷宴千三百里錦帆遊人間無此春風樂樂極人間無此愁朴翁絶唱故錄記之山中趙仲白庚夫有歲除即事曰縫紉連夜辦今朝杵臼頻買花簪稚女送米贈貧鄰宦薄惟名在年華與鬢新桃符詩句好恐動往來人稍得詩云鶴殘籬外筍䑕䑛墨中膠讀文清曽公集云新如月出初三夜淡比湯煎第一泉寄僧云詩句日従窗眼寫墨丸夜入枕頭收久従方詩境晚亦落魄終于右選有子殿試前四名登第所謂不在其身在其子孫也髙九萬越人號菊磵好作唐詩有春詞鬬草歸來上玉階香泥微汚合歡鞋全籌贏得無人賞依舊春愁自滿懐孤山云雪後騎驢行步遲孤山何似灞橋時近來行輩無和靖見說梅花不要詩輦下酒市多祭二郎祠山神有詩云簫鼓喧天閙酒行二郎賽罷賽張王愚民可煞多忘本香火何曽到杜康同周晉仙睡有云更有詩人窮似我夜深來共紙衾眠張韓伯名弋又名奕有秋烟草頎然而長面帶燕趙色口中亦作北語寄秋塘詩五湖風雪分頭去千里淮山信脚行渉世真成妄男子談詩長憶老先生塘邉瓜茹須頻灌郭外田疇粗可耕莫倚瘦笻吟白髪浪傳詩句入都城許定夫館于麾下欲命拜官不受周宗聖有張韓伯欲為羽士趙紫芝作疏之詩後死于建業定夫葬蔣山下題曰大宋詩人張奕墓謝耕道耘天台人自號曰謝一犂有犂春圗諸公喜于納交善滑稽三十年間天下詩人未有不至其室詩軸不知幾牛腰巾髙二尺餘方口大面行于市孰不曰謝一犂因是名滿京洛壁間寫詩中有一聯云路深容馬窄樓小挿花多事繼母極孝母九十七八歲該慶典初封人榮之戴石屏式之名復古黄巖人有石屏詩藁賦淮村兵後云小桃無主自開花烟草茫茫帶晚鴉㡬處敗垣圍故井向來一一是人家秋懐云詩談天下事愁到酒罇前晚春云鶯啼花雨歇燕立柳風微城西云詩骨梅花瘦歸心江水流春日云客愁茅店雨詩思柳橋春九日云黄花一杯酒白髪幾重陽葉元吉名祐之儀矩峻潔癯然玉樹之清家素貧典衣買書讀悟性理之學誦譜尊宿語錄先後次序數百言灑灑可聽有同菴文集二十卷盧蒲江深尊敬之作喜雨詩云木葉臨風皆好色稻田流水亦新聲余舅子也元吉姑子也余不以兄事之事之以師禮手抄詩一卷見授自跋云李長吉有表弟得長吉詩草皆投之溷中為長吉恃才傲物故辱之意余以長吉待元吉也忍四十年之貧爛醉而死余哭之獨哀不忍師道之已矣乎嘉禾有沈鞏字元吉相頡頏于蘇秀二州皆為慈湖先生上弟張端義字正夫荃翁自號也鄭州人居姑蘇大父雲莊公登辛未趙榜先君詠齋為淮南漕光宗即位初年應詔上書下後省看詳羅紫薇㸃劉左史光宗極稱賞之將上為時宰所沮予少苦讀書肄舉子業勇于弓馬甞拜平齋項先生于荆南如慈湖說齋鶴山菊坡習菴皆従之遊愛作詩賦小詞盧蒲江取碧雲千里暮紅葉十分秋之句周晉仙取怨春紅豔冷之句孟藏春取蜨詩不因花退盡必是夢殘時之句凡海内名勝來呉必訪樂圃之張書桃符曰江湖且過詩酒叢林應端平更化詔上第一書二年再應詔上第二書三年明堂雷應詔上第三書得旨韶州安置以螻蟻之微嬰斧鉞之威人皆危之當國者云詔以直言罪以直言非祖宗制幸脫萬死考之典故安置待宰執侍従居住待庶官聽讀待士子自効待軍將小臣用大臣之法誤矣或者以安置為竄謫之極典又非也余三十年前賦秋江圗一絶云浪静風平月正中自搖柔艣駕孤篷若無三萬六千頃把甚江湖着此翁今白髪種種儻符此詩語吾志畢矣余生于淳熙之己亥書于淳祐之辛丑年六十有三有上皇帝三書詩五百首詞二百首雜著三百篇曰荃翁集貴耳集卷上
